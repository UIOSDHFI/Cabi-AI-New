steen door het hekje aan het einde van het parkeerterrein te lopen. Start je vanaf P2 in het dorp, dan loopt de route wat minder door het bos en meer langs de weilanden. Je kunt kiezen uit wandelroutes van 3, 7 of 12 kilometer.\n*   **Drentsche Aa:** Je wandelt vanaf P1 of P2 naar de cabins. Houd er rekening mee dat het **streng verboden is om met de auto het gebied in te rijden** richting de cabins; hier worden boetes voor uitgedeeld.\n*   **Horsterwold (Stille Kern):** Na een wandeling van 2 tot 8 kilometer (afhankelijk van je startpunt) kom je aan bij een houten steiger bij het water. Vanaf daar ben je verplicht een zwemvest aan te trekken en maak je een **korte kanotocht van ongeveer 100 meter** om de drijvende cabin te bereiken.\n*   **Sallandse Heuvelrug:** Vanaf P1 of P2 wandel je direct het bos en de heide in. Omdat de cabins extreem goed verstopt liggen in het landschap, is het **strikt verboden en vrijwel onmogelijk om na zonsondergang aan te komen**.\n*   **Dwingelderveld & Ruinen:** De wandeling vanaf P1 naar cabin C1 is een flinke tocht van ongeveer 16 kilometer. Je kunt deze wandeling aanzienlijk inkorten tot zo'n 7 kilometer door te starten vanaf P2.\n*   **Het Hogeland (Basecamp):** Vanaf de parkeerplaats loop je achter de monumentale boerderij langs en volg je het klinkerpad, dat tevens onderdeel is van het bekende Pieterpad. De cabins liggen iets verderop beneden aan het water aan je rechterhand.\n*   **Lauwersmeer (Basecamp):** Je kunt dit basecamp bereiken via een **korte wandeling van 3 kilometer vanaf P1, langere routes vanaf P2 of P3, of zelfs met de fiets**. Je betreedt het specifieke terrein van de cabins via een klein bruggetje over het water.\n*   **Noord Veluwe (Basecamp / Zwolse Bos):** Voor deze locatie hoef je slechts een **korte wandeling van ongeveer 15 minuten** (1 kilometer) te maken. Vanaf de startplek bij 'het Pompstation' wandel je richting de cabins door een oude, kilometerslange geul in het bos, die ook wel 'het kret' wordt genoemd.", "dify": "## Hoe kom je vanaf de parkeerplaatsen bij de hutten?\n\nIn het algemeen geldt bij Cabiner:\n\n- **De cabins zijn alleen te voet bereikbaar**  \n  In sommige gevallen kan dit **ook per kano** zijn.\n- De cabins liggen **midden in de natuur**, op bijzondere en beschermde plekken.\n- De cabin staat **tijdelijk op een locatie** en is **zelfvoorzienend**.\n- Juist om de impact op natuur en fauna te beperken, begint het verblijf met een **wandelroute vanaf een aangewezen parkeerplaats**.\n\nDe exacte route verschilt per gebied. In de beschikbare informatie staan in elk geval de volgende gebieden en vertrekpunten:\n\n---\n\n## 1. Sallandse Heuvelrug\n\n- De cabins liggen midden in het Nationaal Park en zijn **uitsluitend te voet te bereiken**.\n- De wandelroutes vertrekken vanaf:\n  - **P1** bij het buitencentrum van Staatsbosbeheer  \n    **Adres:** Grotestraat 281, Nijverdal\n- Kom je met het OV:\n  - Vanaf **station Nijverdal** is het **1,3 km lopen** naar het buitencentrum\n  - Je kunt vanaf bushalte **Station Nijverdal** ook **buurtbus 513 richting Raalte** nemen en uitstappen bij halte **Bezoekerscentrum**\n- Voor een kortere of andere route:\n  - Je kunt ook parkeren bij **P2**\n- Let op:\n  - **Bij P3 mag de auto niet meer ’s nachts geparkeerd blijven staan**\n\n### Kort samengevat voor Sallandse Heuvelrug\nJe parkeert normaal bij **P1 aan Grotestraat 281 in Nijverdal** en loopt vanaf daar via de wandelroute naar de cabin. Wil je een kortere of alternatieve route, dan kan **P2** ook gebruikt worden.\n\n---\n\n## 2. Drentsche Aa\n\n- Dit gebied is bosrijk en heideachtig en geschikt voor trektochten.\n- **Alle routes vertrekken vanaf P1**\n- **P1 locatie:** bij het kantoor van Staatsbosbeheer  \n  **Adres:** Ieberen 1, Elp\n- Belangrijk:\n  - Parkeer je auto op de **eerste parkeerplaats aan je rechterhand**\n  - **Niet** op het werkterrein van Staatsbosbeheer parkeren\n- Voor gasten in **C4, C5, C6 of C8** die een kortere route willen:\n  - vertrek mogelijk vanaf **P2**\n  - **P2 locatie:** buitencentrum Boomkroonpad  \n    **Adres:** Steenhopenweg 4, Drouwen\n- Kom je met de bus:\n  - Neem **Qbuzz 21**\n  - Stap uit bij halte **Tienmaatsweg in Grollo**\n- Extra:\n  - De **papieren trekkingkaart** is beschikbaar op **P1**\n  - Voor navigatie is het handig om de routes ook in **Google Maps** te bekijken\n\n### Kort samengevat voor Drentsche Aa\nNormaal start je vanaf **P1 in Elp**. Alleen als je in **C4, C5, C6 of C8** verblijft en korter wilt lopen, kun je ook vanaf **P2 in Drouwen** vertrekken.\n\n---\n\n## 3. Gebied rond Sellingen / Theater van de Natuur\n\nDe beschikbare tekst noemt geen gebiedsnaam in het fragment, maar wel duidelijke vertrekpunten:\n\n- **P1 adres:** Ter Apelerstraat 16, Sellingen  \n  Bushalte: **Oostkamperweg Laude**\n- Parkeerinstructie:\n  - Parkeer je auto **achter de grote schoorsteen**\n- Start van de wandeling:\n  - Begin met je **rug naar de schoorsteen**\n  - Ga door **het hekje aan het einde van het parkeerterrein**\n- Wil je een kortere route:\n  - vertrek vanaf **P2 in het centrum van Sellingen**\n  - **Adres:** Dorpstraat 1, Sellingen\n  - Bushalte: **Sellingen Kerkpad**\n- Deze kortere route loopt:\n  - **minder door het bos**\n  - **meer langs weilanden**\n\n### Afstanden in dit gebied\n- **P1 → C1:** 6,5 km\n- **P1 → C2:** 10,5 km\n- **P2 → C1:** 3 km\n- **P2 → C2:** 3,6 km\n- **C1 ↔ C2:** 7,5 km\n\n### Kort samengevat voor Sellingen\nJe kunt starten vanaf **P1 aan de Ter Apelerstraat 16** of, als je korter wilt lopen, vanaf **P2 aan de Dorpstraat 1**.\n\n---\n\n## 4. Dwingelderveld / Boswachterij Ruinen\n\nIn de beschikbare informatie staat alleen een deel van de route-informatie, maar dit is wel bruikbaar:\n\n- Voor **C1** kun je ook parkeren bij **P2**\n- **P2 adres:** Parkeerplaats bij Plaggenhut Echten, **Zuidwolderweg 2, Echten**\n- Let op:\n  - Parkeer daar alleen bij de **5 parkeerplaatsen langs de doorgaande weg**, naast de plaggenhut\n  - **Niet** op de Brink\n  - **Niet** bij **P3**  \n    **P3 adres:** the Green Planet, Bultinge 2, Pesse\n\n### Afstanden in dit gebied\n- **P1 → C1:** 16 km\n- **P1 → C2:** 6 km\n- **P2 → C1:** 7 km\n- **P2 → C2:** 25 km\n- **P3 → C1:** 7 km\n- **P3 → C2:** 11 km\n\n### Belangrijke nuance\nDe tekst is hier **fragmentarisch**. Daardoor is niet volledig zichtbaar:\n- waar **P1** precies ligt\n- of **P3** als officiële vertrekplaats gebruikt mag worden\n- voor welke cabins welke route standaard is\n\nVoor dit gebied is dus extra context nodig als je een volledig en definitief antwoord per cabin wilt geven.\n\n---\n\n## Algemene uitleg voor gasten\n\nAls je deze vraag voor een gast beantwoordt, kun je dit meestal zo uitleggen:\n\n- **Je parkeert op de aangewezen parkeerplaats van het gebied**\n- **Vanaf daar loop je via de trekkingroute naar de cabin**\n- De cabins zijn **niet met de auto bereikbaar**\n- In sommige gebieden is er een **alternatieve of kortere startplek**\n- Het is verstandig om:\n  - de **trekkingkaart** mee te nemen als die beschikbaar is\n  - de route vooraf ook in **Google Maps** te bekijken\n  - goed op te letten op **specifieke parkeerinstructies**\n\n---\n\n## Belangrijke operationele punten om mee te nemen in communicatie\n\n- Zeg duidelijk dat de cabins **alleen te voet bereikbaar** zijn, behalve waar expliciet staat dat **kano** ook mogelijk kan zijn.\n- Benoem altijd het **juiste startpunt per gebied**.\n- Benoem speciale parkeerwaarschuwingen:\n  - **Sallandse Heuvelrug:** niet meer overnacht parkeren bij **P3**\n  - **Drentsche Aa:** niet parkeren op het **werkterrein** van Staatsbosbeheer\n  - **Echten / Dwingelderveld:** alleen parkeren op de **5 aangewezen plaatsen** langs de weg\n- Als iemand vraagt naar de **exacte looproute naar een specifieke cabin**, dan is de gebiedsnaam of cabincode nodig.\n\n## Als je wilt, kan ik dit ook direct voor je uitschrijven per gebied in een **korte klantreactie in het Nederlands**, of specifieker voor één cabin/gebied zoals **Sallandse Heuvelrug, Drentsche Aa, Sellingen** of **Dwingelderveld**."}, {"id": 17, "query": "Waar kan ik mijn vooraf bestelde maaltijden ophalen?", "notebooklm": "Over het algemeen staan je vooraf bestelde maaltijdpakketten voor je klaar bij het startpunt **P1** van je wandeling, vaak in een speciale koelkast of kast. De exacte ophaallocatie hangt af van het natuurgebied dat je hebt geboekt:\n\n*   **Ruiten Aa:** Je kunt de maaltijden ophalen bij P1 (Ter Apelerstraat 16, Sellingen). Ze liggen klaar in de koelkast met het Cabiner logo, te vinden op het terrein achter de grote schoorsteen. De pakketten zijn hier beschikbaar vanaf 12:00 uur (op maandagen vanaf 13:00 uur).\n*   **Drentsche Aa:** De maaltijdpakketten zijn vanaf 12:00 uur (op maandagen om 13:00 uur) af te halen bij P1, bij het kantoor van Staatsbosbeheer (Ieberen 1, Elp).\n*   **Sallandse Heuvelrug:** De maaltijden bevinden zich in de Cabiner-kast bij het Buitencentrum (P1). Loop vanaf de hoofdingang van dit gebouw linksom; de kast staat daar onder een afdak.\n*   **Dwingelderveld & Ruinen:** Je vindt je maaltijdpakket in de Cabiner-kast bij P1 (het voormalig Planetron). Loop vanaf de ingang van het terrein rechtsom het gebouw; de kast staat tegen de muur net voordat je de hoek omgaat.\n*   **Noord Veluwe (Basecamp / Zwolse Bos):** Voor deze locatie liggen de maaltijden niet bij de parkeerplaats, maar kun je ze ophalen bij het **steenhuisje** dat direct op het basecamp terrein staat.\n\n**Let op:** Het is momenteel helaas (nog) niet mogelijk om maaltijden te bestellen voor de locaties **Het Hogeland, Lauwersmeer en Horsterwold**. Als je naar een van deze locaties gaat, moet je al je eigen eten meenemen.", "dify": "## Waar kunnen gasten hun vooraf bestelde maaltijden ophalen?\n\nDat hangt af van de locatie, maar in de beschikbare info staat het volgende:\n\n- **De maaltijden worden klaargezet in een koelkast bij het startpunt P1 van de wandeling.**\n- De **recepten** liggen in de cabin in het **receptenboekje**.\n- De maaltijden die gasten per dag ontvangen, volgen de **volgorde van de recepten**.\n\n## Belangrijke uitzonderingen / aandachtspunten\n\n- Bij **Het Hogeland**, **Lauwersmeer** en **Horsterwold** is het **op dit moment niet mogelijk om maaltijden te bestellen**.\n- Als een gast zegt dat een besteld maaltijdpakket **niet in de koelkast aanwezig is**, dan moet je nagaan:\n  - in **welk gebied** de boeking is\n  - in **welke cabin** de gast verblijft\n  - wat het **boekingsnummer** is\n  - of het gaat om een **heel ontbrekend pakket** of slechts **enkele ontbrekende ingrediënten**\n- In zo’n geval kun je tegen de gast zeggen dat je het **gaat uitzoeken en zo snel mogelijk terugkomt**.\n\n## Extra info die je kunt meegeven\n\n- In de cabin hoort een **maaltijdreceptenboekje** klaar te liggen.\n- Ontbreekt dat boekje in de cabin, dan moet dat intern in de **beheerlijst** worden gezet.\n\n## Korte formulering voor richting gast\n\nJe kunt dit zo antwoorden:\n\n> Je vooraf bestelde maaltijden staan meestal klaar in een koelkast bij **startpunt P1** van de wandeling. In de cabin vind je het receptenboekje, en de maaltijden zijn per dag op dezelfde volgorde ingedeeld als de recepten.  \n> Let op: op **Het Hogeland, Lauwersmeer en Horsterwold** kunnen momenteel geen maaltijden worden besteld.\n\nAls je wilt, kan ik hier ook meteen een **klantvriendelijk Trengo-antwoord** van maken."}, {"id": 18, "query": "Kan ik mijn geld terugkrijgen als ik mijn boeking annuleer?", "notebooklm": "Ja, of je je geld terugkrijgt hangt af van het moment waarop je de boeking annuleert en of je hebt gekozen voor deelname aan het annuleringsfonds:\n\n**Standaard annuleringsvoorwaarden (zonder annuleringsfonds):**\n*   **Meer dan 60 dagen voor de aankomstdatum:** Ja, je krijgt het volledige bedrag terug, minus een eenmalige administratiekost van €30.\n*   **Tussen 60 en 30 dagen voor de aankomstdatum:** Je krijgt een gedeeltelijke terugbetaling. Cabiner houdt 30% van de initiële huurprijs plus €30 administratiekosten in.\n*   **Binnen 30 dagen voor de aankomstdatum:** Nee, in dit geval ben je 100% van de overeengekomen prijs verschuldigd en krijg je geen geld terug.\n\n**Als je het annuleringsfonds hebt afgesloten:**\nHeb je tijdens het boeken het annuleringsfonds bijgeboekt? Dan kun je in veel gevallen wél je geld terugkrijgen. Dit geldt echter alleen wanneer je annuleert door een vastgestelde onzekere gebeurtenis (bijvoorbeeld ziekte of een blessure) en je hiervoor een geldig bewijsstuk (zoals een doktersverklaring) kunt aanleveren. \n\n**Alternatieven als je geen geld terug kunt krijgen:**\nAls je buiten de voorwaarden voor restitutie valt, heb je nog twee opties om te voorkomen dat je boeking verloren gaat:\n*   **Boeking gratis overdragen:** Je mag de boeking altijd kosteloos overdragen aan familie of vrienden. Je hoeft hiervoor alleen hun namen en contactgegevens aan Cabiner door te geven.\n*   **De voucher-optie:** In speciale omstandigheden kan Cabiner jouw geannuleerde nacht opnieuw openzetten voor verhuur. Als de cabin succesvol **door iemand anders wordt geboekt**, krijg je je geld niet contant terug, maar ontvang je een **compensatievoucher** ter waarde van de originele boeking (minus €30 administratiekosten) die je binnen 1 jaar kunt inwisselen voor een nieuw verblijf.", "dify": "## Ja, dat kan soms — het hangt af van **hoe ver de aankomstdatum nog weg is** en of de gast een **annuleringsfonds** heeft.\n\nDe annuleringsvoorwaarden werken als volgt:\n\n### 1. Aankomst is **meer dan 60 dagen** vanaf nu\n- De gast krijgt de **volledige initiële prijs terug**\n- Er wordt wel **€30 administratiekosten** ingehouden\n\n### 2. Aankomst is **tussen 60 en 30 dagen** vanaf nu\n- Controleer of de gast een **annuleringsfonds** heeft afgesloten\n- **Met annuleringsfonds:** vraag om **bewijs** van de reden van annulering  \n  Als het bewijs wordt aangeleverd en de reden onder de voorwaarden van het fonds valt, kan het fonds worden toegepast\n- **Zonder annuleringsfonds**, of als de reden **niet onder de fondsvoorwaarden valt**:\n  - de kosten zijn **30% van de oorspronkelijke prijs + €30 administratiekosten**\n\n### 3. Aankomst is **binnen 30 dagen**\n- Controleer opnieuw of de gast een **annuleringsfonds** heeft\n- **Met annuleringsfonds:** vraag om **bewijs**  \n  Als dat wordt geleverd en de reden is geldig, kan het fonds worden toegepast\n- **Zonder annuleringsfonds**, of als de reden **niet onder de voorwaarden valt**:\n  - de annuleringskosten zijn **100% van de oorspronkelijke prijs**\n\n---\n\n## Extra belangrijke punten\n\n### Als de gast geld terugkrijgt via het annuleringsfonds\nDan gebeurt dat:\n- **met aftrek van het annuleringsfonds**\n- en **met aftrek van €30 wijzigingskosten**\n\n### Geldige reden + annuleringsverzekering/fonds\nAls iemand een annuleringsverzekering/fonds heeft én een geldige reden, dan gelden de annuleringsvoorwaarden en krijgt de gast het geld retour volgens die regeling.\n\n### Corona\n- Als een van de gasten thuis ziek is met corona, dan **valt dat wel onder de annuleringsverzekering**\n- Vraag wel om:\n  - een **doktersverklaring**, of\n  - een **positieve test met datum** van de gast(en)\n\n### Buitenlandse gasten met een uitreisverbod\n- Deze gasten hebben **geen recht op geld terug**\n- Dat geldt **ook als ze een annuleringsverzekering hebben**\n- Reden: Cabiner heeft het verblijf niet geannuleerd; de gast wil zelf wijzigen of annuleren\n\n---\n\n## Alternatief als de gast het hier niet mee eens is\n\nEr is ook een **voucheroptie** als:\n- een gast erg ontevreden is en niet akkoord gaat met de regeling, of\n- er bijzondere omstandigheden zijn waardoor een bezoek aan de cabin niet mogelijk is\n\nVoor de precieze werkwijze daarvan staat er een apart Trengo-artikel.\n\nDaarnaast:\n- **Het overdragen van een boeking aan vrienden of familie is gratis**\n\n---\n\n## Praktisch antwoord voor gebruik richting gast\n\nJe kunt dit kort zo formuleren:\n\n> Of je geld terugkrijgt, hangt af van hoe lang het nog duurt tot je aankomst en of je een annuleringsfonds hebt afgesloten.  \n> - Meer dan 60 dagen voor aankomst: terugbetaling van het volledige bedrag minus €30 administratiekosten  \n> - Tussen 60 en 30 dagen: zonder geldig annuleringsfonds 30% van de reissom + €30 kosten  \n> - Binnen 30 dagen: zonder geldig annuleringsfonds 100% annuleringskosten  \n> Heb je een annuleringsfonds, dan kijken we of je reden onder de voorwaarden valt. In dat geval ontvangen we graag bewijsstukken.\n\n## Als je wilt, kan ik hier ook meteen een:\n- **korte klantreactie in het Nederlands**\n- **vriendelijke e-mailtemplate**\n- of **beslisboom voor agents** van maken."}, {"id": 19, "query": "Hoe kan ik me aanmelden voor de VIP-wachtlijst?", "notebooklm": "Je kunt je op twee manieren aanmelden voor de VIP-wachtlijst:\n\n*   **Via de website:** Je kunt jezelf eenvoudig opgeven voor de wachtlijst en de nieuwsbrief via de **homepage van de Cabiner website**.\n*   **Via de klantenservice (bij het inwisselen van een voucher):** Als je een voucher wilt inwisselen maar geen nieuwe datum kunt vinden omdat alles volgeboekt is, kun je contact opnemen met de klantenservice. Door je **e-mailadres aan hen door te geven**, kunnen zij je handmatig op de VIP-lijst plaatsen. Op deze manier word je als eerste op de hoogte gehouden wanneer er nieuwe cabins of plekken beschikbaar komen om te boeken.", "dify": "## Aanmelden voor de VIP-wachtlijst\n\nAls iemand zijn **voucher wil inwisselen**, maar **geen nieuwe datum kan vinden** omdat het erg vol zit, dan kun je diegene op de **VIP-lijst** laten zetten.\n\n### Werkwijze\n- Vraag de gast om zijn of haar **e-mailadres**\n- **Tag Eva**\n- Dan wordt die persoon op de **VIP-lijst** gezet\n\n### Wat je erbij kunt communiceren\nJe kunt erbij vermelden dat:\n- er **binnenkort nieuwe cabins aankomen**\n- wij de gast **op de hoogte houden zodra die te boeken zijn**\n- zij dan **als eerste een plekje kunnen reserveren**\n\n## Belangrijke nuance\nDe beschikbare info beschrijft alleen deze interne route:\n- **mailadres opvragen**\n- **Eva taggen**\n- **op de VIP-lijst plaatsen**\n\nEr staat **niet** in de beschikbare tekst:\n- of gasten zich zelfstandig via de website voor de **VIP-wachtlijst** kunnen aanmelden\n- of dit alleen bedoeld is voor **voucherhouders die geen datum kunnen vinden**\n\nDus als je dit breder wilt beantwoorden voor andere soorten gasten, is extra broninformatie nodig.\n\n## Handige klantreactie\nJe kunt dit zo sturen:\n\n> Als je je voucher wilt inwisselen maar momenteel geen geschikte datum kunt vinden, stuur dan even je e-mailadres door. Dan zetten we je op de VIP-lijst, zodat we je op de hoogte kunnen houden zodra nieuwe cabins beschikbaar zijn en je als eerste kunt reserveren.\n\nAls je wilt, kan ik hier ook meteen een **kort Trengo-antwoord** of **interne werkinstructie** van maken."}, {"id": 20, "query": "Vertel me meer over de drijvende hut in Horsterwold.", "notebooklm": "De drijvende cabin in het Horsterwold ligt in de 'Stille Kern', een uniek natuurgebied van 900 hectare waar de natuur haar gang mag gaan en waar je vrij mag struinen buiten de paden. Een verblijf op deze locatie is ontworpen voor echte avonturiers en vereist een goede voorbereiding. \n\nHier zijn de belangrijkste details over het verblijf in deze bijzondere watercabin:\n\n*   **Aankomst per kano:** Na je wandeling van 2 tot 8 kilometer kom je aan bij een houten steiger. Vanaf daar moet je een korte kanotocht van ongeveer 100 meter maken om de cabin te bereiken, die letterlijk op een meertje drijft. Je meert de kano voor je deur aan.\n*   **Veiligheidsregels:** Een goede zwemvaardigheid is vereist en het dragen van de aanwezige zwemvesten is tijdens elke kanotocht verplicht. Om veiligheidsredenen is het **niet toegestaan voor kinderen tot en met 5 jaar** om hier te verblijven of mee te varen. \n*   **Sleutels en uitrusting:** De peddels, zwemvesten en de sleutels van de cabin bevinden zich niet bij de kano, maar liggen iets verderop in een speciale kist bij een klein bruggetje. De kano, de sleutelkist en het reserve-sleutelkastje bij de cabin werken allemaal met dezelfde code: **2305**.\n*   **Zelf hout vervoeren:** Omdat de cabin op het water drijft, kan er geen zware voorraad stookhout in de cabin worden bewaard. Je moet daarom **elke dag zelf je brandhout in een tas vervoeren** vanuit de kist bij de brug, met de kano naar de cabin.\n*   **Drinkwater & eten:** Het kraanwater in de cabin wordt direct uit het oppervlaktewater gehaald waar de cabin op drijft. De kwaliteit hiervan is lager dan bij de andere cabins en het is **geen drinkwater**. Je wordt dringend geadviseerd om al je eigen drinkwater mee te nemen. Ook is het op deze locatie niet mogelijk om een maaltijdpakket te bestellen, dus je moet al je eigen eten meenemen in je rugzak.\n*   **Helemaal off-grid:** Je zult rondom deze cabin nauwelijks tot geen mobiel bereik hebben. Daarnaast wordt de drijvende cabin slechts **één keer per twee weken schoongemaakt** (in tegenstelling tot wekelijks bij andere cabins), waardoor je nog meer dan elders zelfvoorzienend bent en verantwoordelijk bent om alles bezemschoon en netjes achter te laten voor de volgende gasten.", "dify": "## Drijvende cabin in Horsterwold\n\nDe drijvende cabin in Horsterwold ligt **aan de rand van de Stille Kern**, op een **meertje**. Dit is echt een locatie **voor avontuurlijke gasten** en vraagt om **goede voorbereiding, de juiste uitrusting en respect voor natuur, regels en andere bezoekers**.\n\n### Karakter van het gebied\n- Het gaat om de **Stille Kern van Horsterwold**, een natuurgebied van **900 hectare**.\n- In dit gebied mag de natuur grotendeels **haar gang gaan**.\n- Er zijn **nauwelijks paden en geen routes** in de Stille Kern zelf; bezoekers mogen daar in principe **zelf hun weg zoeken**.\n- Het telefoonbereik is er **nauwelijks aanwezig**, dus het is echt een plek om **off-grid** te zijn.\n\n### Toegang en wandelen\n- Voor de wandeling **naar de cabin** kunnen gasten kiezen uit routes van **2 tot 8 km**.\n- Die aanlooproutes gaan **wel over paden**.\n- Vanuit de cabin kunnen gasten de Stille Kern verder verkennen.\n- Daarbij zijn een **gps-apparaat**, een **goed richtingsgevoel** en **voldoende daglicht** echt belangrijk.\n\n### Water in deze cabin\nVoor **Horsterwold C1** geldt:\n- Het water in deze cabin wordt gehaald uit het **oppervlaktewater** waarop de cabin drijft.\n- De waterkwaliteit is daardoor **minder dan in andere cabins**.\n- Advies: gasten moeten **uitsluitend hun eigen meegenomen drinkwater gebruiken voor consumptie**.\n\nMeer algemeen geldt voor Cabiner-cabins:\n- De cabins zijn **niet voorzien van drinkwater**.\n- Er wordt dus geadviseerd om **zelf drinkwater mee te nemen**.\n- Cabins gebruiken afhankelijk van de locatie **gefilterd grondwater, opgevangen regenwater of oppervlaktewater**.\n- Ook als water technisch van goede kwaliteit is, mag het **niet als drinkwater worden aangeboden**.\n\n### Interne operationele info over toegang / sleutelprocedure\nEr staat ook een specifieke interne instructie voor deze locatie:\n\n- **Bel gasten altijd even** om alles stap voor stap door te nemen.\n- **Achter de houtkist** op de kade zit een **reserve-sleutelkastje van de kist**.\n- **Code van dat kastje: 2305**\n- Het is **niet de bedoeling** dat gasten de **sleutel van de kist meenemen naar de cabin**.\n- De **kano** zit vast met een **codeslot met dezelfde code: 2305**.\n- Bij de cabin zit aan de **linkerkant van de vlonder, aan de onderkant**, het **back-up sleutelkastje voor de cabin**.\n- Let op: dit zijn **sleutels zonder drijver**. Als ze in het water vallen, is er **geen reservesleutel meer**.\n- Daarom: gasten **goed begeleiden**, **altijd bellen**, en **stap voor stap uitleggen**.\n\n### Handige link voor gasten\nAls gasten veel vragen hebben over voorbereiding of de omgeving, kun je ze verwijzen naar de infopagina van deze locatie:\n\n- **Horsterwold (drijvende cabin):** https://www.cabiner.com/infohw\n\n## Korte samenvatting voor intern gebruik\nDe drijvende cabin in Horsterwold is een **zeer avontuurlijke, off-grid locatie** aan de rand van de **Stille Kern**. Gasten moeten goed voorbereid zijn, rekening houden met **weinig bereik**, en voor verkenning van het gebied zijn **oriëntatievermogen en gps** belangrijk. Voor consumptie moeten ze **eigen drinkwater meenemen**. Bij vragen over aankomst en toegang is het belangrijk om gasten **telefonisch en stap voor stap** te begeleiden, mede vanwege de **kano, sleutelkastjes en het risico op verlies van sleutels in het water**.\n\nAls je wilt, kan ik hier ook meteen een **klantklare uitleg** van maken die je zo in Trengo kunt sturen."}, {"id": 21, "query": "Wat moet ik meenemen voor de hut in Horsterwold?", "notebooklm": "Voor je verblijf in de drijvende cabin in het Horsterwold heb je de standaard Cabiner-paklijst nodig, plus een paar essentiële zaken die specifiek zijn voor deze off-grid waterlocatie. Omdat je alles zelf moet dragen tijdens de wandeling en de oversteek in de kano, is efficiënt inpakken belangrijk.\n\n**Cruciale zaken specifiek voor de cabin in Horsterwold:**\n*   **Al je drinkwater:** Het water uit de kraan wordt bij deze cabin direct uit het oppervlaktewater gehaald waar de cabin op drijft en is daardoor **geen drinkwater**. Je wordt sterk geadviseerd om uitsluitend je eigen meegenomen drinkwater te gebruiken voor alle consumptie.\n*   **Al je eten:** Het is helaas niet mogelijk om voor de locatie Horsterwold maaltijdpakketten te bestellen. Je moet dus al het eten voor je gehele verblijf zelf meenemen in je rugzak.\n*   **Een grotere rugzak:** Omdat je veel zware boodschappen en water zelf moet meedragen, is een grotere rugzak van **50 tot 60 liter** aan te raden in plaats van de standaard 30 liter. \n\n**Standaard Cabiner paklijst:**\n*   **Beddengoed:** Een slaapzak, een hoeslaken (voor een matras van 160 cm breed) en een kussensloop.\n*   **Handdoeken:** Badhanddoeken, een theedoek en een vaatdoek.\n*   **Praktische spullen:** Een zaklamp, een regenjas en een powerbank (de USB-poort in de cabin werkt mogelijk niet als er weinig zonne-energie is opgewekt).\n*   **Schoeisel:** Stevige wandelschoenen en laarzen (vooral als het veel heeft geregend).\n*   **Zomerartikelen:** Anti-muggenspray, indien je in de periode van mei tot september verblijft.\n\nDaarnaast is er geen afvalservice bij de cabins; je wordt verplicht om **al je eigen afval weer mee terug te nemen** in je rugzak naar het startpunt. Je hoeft overigens geen stookhout vanuit huis mee te nemen, maar houd er wel rekening mee dat je elke dag je houtvoorraad in een tas vanuit de kist bij het bruggetje met de kano naar de cabin moet vervoeren.", "dify": "## Wat moet je meenemen voor de hut in Horsterwold?\n\nVoor Horsterwold geldt de algemene paklijst voor een off-grid verblijf, met daarnaast extra aandacht voor **drinkwater** en **goede voorbereiding**, omdat dit een avontuurlijk gebied is met weinig bereik en beperkte routes.\n\n### Basis paklijst\nNeem in ieder geval mee:\n\n- **Slaapzak**\n- **Hoeslaken (160 cm)** en **kussensloop**\n- **Handdoeken, theedoek en vaatdoek**\n- **Eten**\n  - In sommige gebieden is een **maaltijdpakket** mogelijk\n- **Zaklamp**\n- **Powerbank**\n- **Anti-muggenspray** *(van mei tot september)*\n- **Wandelschoenen**\n- **Laarzen** *(als het veel heeft geregend)*\n- **Rugzak**\n  - Advies: **minimaal 30 liter**\n- **Regenjas**\n- **Drinkwater**\n\n### Extra aandacht voor maaltijdpakket\nAls een gast een maaltijdpakket heeft besteld:\n\n- Houd rekening met ruimte in of aan de rugzak voor een **boodschappentas van ongeveer 3 kg per dag**\n- Een **grotere rugzak van 50–60 liter** is dan aan te raden\n- Eventueel een **bakje meenemen** om restjes weer mee naar huis te nemen\n\n### Extra belangrijk in Horsterwold\nVoor Horsterwold is goede voorbereiding extra belangrijk:\n\n- Het gebied is bedoeld voor **echte avonturiers**\n- Er zijn in de Stille Kern **nauwelijks paden en geen routes**\n- Het telefoonbereik is er **nauwelijks**\n- Voor verkenning vanuit de cabin zijn een:\n  - **gps-apparaat**\n  - **goed richtingsgevoel**\n  - **voldoende daglicht**\n  \n  echt belangrijk\n\n### Drinkwater in Horsterwold\nVoor Horsterwold geldt extra nadrukkelijk:\n\n- Het water daar is **geen drinkbaar water**\n- Je moet dus **zelf drinkwater meenemen**\n- Advies: neem **minimaal 1 liter drinkwater per persoon** mee\n- Voor kleine kinderen, bij zwangerschap, verminderde weerstand en in **Horsterwold** wordt geadviseerd om **uitsluitend meegenomen drinkwater** te gebruiken\n\n## Wat is al aanwezig in de cabin?\nJe hoeft niet alles zelf mee te nemen. In de cabin zijn onder andere aanwezig:\n\n- **2 tweepersoonsbedden** met matrassen en **kussens**\n- **Borden, bekers, bestek**\n- **Gietijzeren pan** en **spatel**\n- **Koffiezetter (percolator)**, **theepot**, **koffie en thee**\n- **Stanley thermoskan van 0,5 liter**\n- **Houtkachel**, inclusief:\n  - brandhout\n  - lucifers\n  - aanmaakblokjes\n- **Afwasmiddel**\n- **Afvalzakjes**\n- **Veger en blik**\n- **Olijfolie, peper, zout en kruiden**\n- **EHBO** en **tekentang**\n- **Brandblusser** en **blusdeken**\n- **CO2- en brandmelder**\n- **Eco douchegel/shampoo**\n- **Biologisch afbreekbaar toiletpapier**\n- **Reservelamp op batterijen**\n- **Geen wifi**\n\nDaarnaast kunnen aanwezig zijn, maar die kunnen mogelijk buiten werking zijn:\n- **Koellade** *(in de zomer)*\n- **USB-poort voor het opladen van een mobiele telefoon*\n\n## Kort advies voor Horsterwold\nAls je dit praktisch wilt samenvatten voor een gast:\n\n**Neem licht maar slim mee:** slaapspullen, handdoeken, eten, voldoende drinkwater, stevige wandelschoenen, regenkleding, zaklamp/powerbank en bij Horsterwold extra oriëntatiehulpmiddelen zoals gps.\n\nAls je wilt, kan ik hier ook meteen een **korte gasttekst voor Trengo** van maken."}, {"id": 22, "query": "Hoe gebruik ik de kano bij de Horsterwold-hut?", "notebooklm": "Bij de drijvende cabin in het Horsterwold is de kano een essentieel onderdeel van je verblijf. Hier vind je alles wat je moet weten over het gebruik en de regels:\n\n**De kano en uitrusting vinden**\nNa je wandeling kom je aan bij een houten steiger waar de kano klaarligt. De kano is vastgemaakt met een cijferslot; de **code hiervoor is 2305**. De peddels, de verplichte zwemvesten en de sleutels van de cabin liggen echter niet bij de boot zelf, maar bevinden zich iets verderop in een speciale kist bij een klein bruggetje. \n\n**Veiligheid en regels**\n*   **Zwemvesten verplicht:** De verhuurder stelt het strikt verplicht dat iedereen tijdens elke kanotocht een zwemvest draagt.\n*   **Zwemvaardigheid:** Een goede zwemvaardigheid is voor iedereen vereist. Zorg er daarnaast voor dat je zeer behoedzaam in- en uitstapt om omslaan te voorkomen, ook al is kano-ervaring niet per se noodzakelijk.\n*   **Leeftijdsgrenzen:** Om veiligheidsredenen zijn **kinderen tot en met 5 jaar niet toegestaan** om mee te varen of op deze locatie te verblijven. Kinderen van 6 tot 18 jaar mogen uitsluitend kanoën onder toezicht en verantwoordelijkheid van een volwassene.\n*   **Tijden en weer:** Je mag de kano uitsluitend gebruiken **tussen zonsopgang en zonsondergang**. Mocht er onweer naderen, dan ben je verplicht direct het water te verlaten. \n\n**Waar mag je kanoën?**\nJe gebruikt de kano voornamelijk voor de korte oversteek van ongeveer 100 meter naar de cabin. Je hebt ook toestemming om langere tochten te maken op de door Cabiner aangegeven kano-routes (deze totale route duurt zo'n 5 uur).\n\n**Brandhout vervoeren**\nOmdat de cabin op het water drijft, kan er geen grote, zware voorraad stookhout in het huisje worden bewaard. Je moet daarom **elke dag zelf je houtvoorraad in een tas vervoeren** vanuit de kist bij het bruggetje met de kano naar je cabin. Zorg ervoor dat je deze tas na gebruik altijd weer teruglegt in de kist voor de volgende gasten.", "dify": "## Kano gebruiken bij de Horsterwold-cabin\n\nBij Horsterwold hoort een **kano-oversteek** naar de drijvende cabin. Hieronder staat wat je intern veilig en correct aan gasten kunt uitleggen.\n\n### Waar ligt de kano?\n- De wandeling eindigt bij de **steiger**.\n- Daar ligt de **kano**.\n- De **peddels**, **zwemvesten** en de **sleutels van de cabin** liggen iets verderop in de **kist**.\n\n### Slot / code\n- De kano zit vast met een **codeslot**.\n- De code van dat slot is **2305**.\n- Die code is **gelijk aan de code van het sleutelkastje** van de kist.\n\n### Sleutelprocedure die je stap voor stap moet uitleggen\nVoor Horsterwold is de sleutelprocedure afwijkend en belangrijk:\n\n1. **Bel de gasten altijd even** om dit mondeling door te lopen.\n2. **Achter de houtkist** op de kade zit een **reserve-sleutelkastje van de kist**.\n3. De **deurcode daarvan is 2305**.\n4. Met die sleutel kunnen ze de **kist openen**.\n5. In de kist horen de **sleutels van de cabin** te liggen.\n   - Die liggen niet altijd op exact dezelfde plek.\n   - Soms liggen ze in het **witte tonnetje**.\n   - Soms liggen ze in het **sleutelkastje**.\n6. De **kistsleutel mag niet mee naar de cabin**.\n7. Daarna kunnen ze de **kano losmaken** met code **2305**.\n8. Bij de cabin zit aan de **linkerkant van de vlonder, aan de onderkant**, nog een **back-up sleutelkastje voor de cabin**.\n\n### Veiligheidsregels voor de oversteek\nDeze punten moet je duidelijk meegeven:\n\n- **Zwemvesten zijn verplicht** tijdens de oversteek.\n- **Goede zwemvaardigheid is vereist**.\n- **Kinderen t/m 5 jaar mogen niet meevaren**.\n\n### Zeer belangrijk intern aandachtspunt\n- De sleutels zijn **zonder drijver**.\n- Als ze **in het water vallen**, is er **geen reservesleutel meer**.\n- Daarom moeten gasten:\n  - **heel goed begeleid** worden\n  - **telefonisch** worden geholpen\n  - de instructies **stap voor stap** krijgen\n\n### Hout meenemen\nVoor deze drijvende cabin geldt ook:\n- Er kan niet veel hout bij de cabin zelf worden opgeslagen.\n- Gasten moeten **per dag zelf hout meenemen**.\n- Dat hout ligt klaar in de **kist bij het bruggetje / de kade**.\n- Ze kunnen een **tas vullen** en die meenemen in de kano.\n- Die tas moeten ze **na gebruik terugleggen in de kist** voor de volgende gasten.\n\n## Praktische tekst voor aan gasten\nJe kunt dit ongeveer zo uitleggen:\n\n> Aan het einde van de route kom je bij de steiger waar de kano ligt. De kano zit vast met een codeslot met code **2305**. In de kist iets verderop liggen de peddels, zwemvesten en cabinsleutels. Achter de houtkist zit een sleutelkastje met ook code **2305** voor toegang tot de kist. Let erop dat je de sleutel van de kist niet meeneemt naar de cabin. Draag tijdens de oversteek altijd een zwemvest. Kinderen van 5 jaar en jonger mogen niet mee in de kano. Let extra goed op met de sleutels: die hebben geen drijver en mogen niet in het water vallen.\n\nAls je wilt, kan ik hier ook een **ultrakorte klantenservice-reply** van maken voor chat of e-mail."}, {"id": 23, "query": "Zijn honden toegestaan ​​in de hutten?", "notebooklm": "**Nee, honden en andere huisdieren zijn helaas niet toegestaan in de hutten**. \n\nDit strikte beleid is ingesteld voor het **welzijn van de wilde dieren in de natuurgebieden**. De geur van een hond is namelijk al genoeg om wilde dieren af te schrikken en op afstand te houden. Omdat het concept zich juist richt op de unieke natuurbeleving waarbij gasten wilde dieren direct rondom hun hut kunnen waarnemen, is besloten honden niet toe te laten.\n\nIn de bronnen wordt wel benadrukt dat ze begrijpen dat dit teleurstellend is voor hondenbezitters. Om die reden zijn ze momenteel **samen met Staatsbosbeheer aan het zoeken naar nieuwe gebieden** waar het in de toekomst wellicht wél mogelijk is om een hond mee te nemen naar de cabins.", "dify": "## Nee, honden zijn niet toegestaan in of bij de cabins.\n\nDit beleid is op meerdere plekken duidelijk vastgelegd:\n\n- **Honden zijn niet toegestaan naar/in de cabin.**\n- **Huisdieren zijn niet toegestaan in de cabins.**\n\n### Reden\nCabiner staat dit niet toe vanwege **faunawelzijn en ecologische overwegingen**:\n\n- De **geur van honden** zorgt ervoor dat **wilde dieren wegblijven**.\n- Cabiner wil juist dat gasten **wilde dieren kunnen waarnemen rond de cabins**.\n- Daarnaast is dit ook **ecologisch niet te verantwoorden richting gemeentes en provincie**.\n\n### Handige formulering richting gasten\nJe kunt dit zo uitleggen:\n\n> Helaas zijn honden en andere huisdieren niet toegestaan bij Cabiner. Dit heeft te maken met faunawelzijn: de geur van honden zorgt ervoor dat wilde dieren wegblijven, terwijl de natuurbeleving en het kunnen spotten van wild juist een belangrijk onderdeel van het verblijf zijn. Daarnaast speelt ook de ecologische toetsing van de gebieden een rol.\n\n### Belangrijke nuance\nEr staat wel vermeld dat Cabiner samen met **Staatsbosbeheer** kijkt naar **nieuwe gebieden waar dit in de toekomst mogelijk zou kunnen zijn**, maar **voor de huidige cabins geldt dat honden niet zijn toegestaan**."}, {"id": 24, "query": "Wat staat er allemaal in de VIP-lijstmelding?", "notebooklm": "De VIP-lijstmelding (ook wel de wachtlijst e-mail genoemd) wordt voornamelijk gebruikt om abonnees op de hoogte te houden van de beschikbaarheid van de cabins, aangezien Cabiner gasten niet individueel mailt wanneer er een specifieke plek vrijkomt.\n\nDeze e-mails bevatten doorgaans de volgende informatie:\n\n*   **Last-minute beschikbaarheid:** Wanneer gasten hun boeking op het laatste moment (moeten) annuleren, probeert Cabiner deze vrijgekomen nachten opnieuw te verhuren door ze aan de wachtlijst aan te bieden.\n*   **Herinneringen voor openstaande nachten:** Als er ongeveer een week van tevoren nog relatief veel nachten ongetoond openstaan, wordt er een e-mail verstuurd om de abonnees hierop te attenderen.\n*   **Kortingen en seizoensgebonden inhoud:** De e-mails kunnen speciale aanbiedingen of kortingen bevatten. Daarnaast worden de titels, teksten en foto's in de e-mail vaak mooi aangepast aan de sfeer van het huidige seizoen.", "dify": "## Wat je hierover wél zeker kunt zeggen\n\nDe VIP-lijst wordt gebruikt om gasten te informeren over:\n\n- **wanneer er nieuwe cabins bijkomen / te boeken zijn**\n- **wanneer last minutes worden vrijgegeven**\n\nDaarnaast kun je gasten die hun voucher willen inwisselen maar **geen nieuwe datum kunnen vinden** laten weten dat:\n\n- er **binnenkort nieuwe Cabins aankomen**\n- jullie hen **op de hoogte houden zodra deze te boeken zijn**\n- zij dan **als eerste een plekje kunnen reserveren**\n\n### Interne werkwijze\nAls een gast hiervoor in aanmerking komt:\n\n- vraag om het **mailadres**\n- **tag Eva**\n- dan kan de gast **op de VIP-lijst** worden gezet\n\n---\n\n## Wat ik níet volledig uit de huidige info kan halen\n\nDe precieze **inhoud/tekst van de VIP-lijstmelding zelf** staat hier niet volledig uitgeschreven.  \nIk kan dus niet met zekerheid aangeven:\n\n- wat de **exacte mailtekst** is\n- of er een **standaard template** bestaat\n- welke **velden/segmenten/lijsten** precies gebruikt worden\n- of dit in **Trengo, Brevo of een andere tool** handmatig wordt verwerkt\n\n---\n\n## Wat er daarnaast nog bekend is over de wachtlijstmailing\n\nEr is ook een oudere handleiding voor het **mailen van de wachtlijst via Brevo**. Daaruit blijkt:\n\n- de wachtlijstmail wordt via **Brevo** verstuurd\n- daarin staan contactgegevens van **nieuwsbrief- en wachtlijstabonnees**\n- mensen schrijven zich daar **zelf voor in via de website**\n- voor een mailing kun je een eerdere campagne **dupliceren** in Brevo in plaats van steeds een nieuwe op te zetten\n\n---\n\n## Kort antwoord\n\nDe VIP-lijstmelding gaat in elk geval over:\n\n1. **nieuwe cabins die beschikbaar komen**\n2. **last minutes die worden vrijgegeven**\n3. gasten met een voucher **als eerste informeren** zodat zij eerder kunnen boeken\n\nAls je wilt, kan ik hier ook meteen een **interne voorbeeldtekst voor zo’n VIP-lijstmelding** van maken in Cabiner-tone-of-voice."}, {"id": 25, "query": "Hoeveel mensen ontvangen doorgaans een melding?", "notebooklm": "Doorgaans ontvangen ongeveer **1.000 tot 2.000 mensen** tegelijkertijd een melding. \n\nCabiner kiest er bewust voor om niet de gehele wachtlijst in één keer te mailen. Hiervoor hebben zij twee belangrijke redenen:\n*   **Om teleurstellingen te voorkomen**, vooral wanneer er bijvoorbeeld maar één nacht beschikbaar is.\n*   **Om spammen te voorkomen**, zodat de mensen op de wachtlijst niet overspoeld worden met te veel e-mails.", "dify": "## Doorgaans ontvangen **ongeveer 1000 tot 2000 mensen per keer** een melding.\n\nEr staat ook een praktische richtlijn bij:\n\n- meestal wordt **ongeveer 1000–2000 ontvangers** geselecteerd per verzending\n- dit is om **teleurstelling te voorkomen** als er bijvoorbeeld maar **één nacht** beschikbaar is\n- en ook om te voorkomen dat mensen op de wachtlijst **te vaak gemaild** worden\n\n### Extra detail\nEr wordt daarbij gefilterd op contactpersonen die in de **laatste 2 maanden geen mail** hebben ontvangen. Daarna wordt het nieuwe aantal ontvangers zichtbaar.\n\n## Kort samengevat\nReken intern meestal op **een batch van circa 1000–2000 ontvangers per mailing**."}];

  const bar = el('div', 'heatbar');
  for (let i = 1; i <= 5; i++) {
    const seg = el('div', 'heatbar-seg');
    seg.style.background = i <= Math.round(score) ? color : 'var(--border)';
    bar.appendChild(seg);
  }
  return bar;
}

function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  DATA.forEach(item => {
    const r = RESULTS[item.id];
    const li = el('li', 'q-item' + (selectedId === item.id ? ' active' : ''));
    li.onclick = () => selectItem(item.id);
    li.appendChild(el('div', 'q-num', '#' + String(item.id + 1).padStart(2,'0')));
    li.appendChild(el('div', 'q-text', item.query));
    const meta = el('div', 'q-meta');
    const avg = avgScore(r);
    ['factuality','tone','relevance'].forEach(dim => {
      const dot = el('div', 'dot ' + scoreClass(r[dim].score));
      dot.title = dim + ': ' + r[dim].score + '/5';
      meta.appendChild(dot);
    });
    meta.appendChild(el('span', 'avg-tag', avg.toFixed(2)));
    li.appendChild(meta);
    list.appendChild(li);
  });
}

function selectItem(id) {
  selectedId = id;
  renderList();
  renderDetail(id);
}

function renderDetail(id) {
  const item = DATA.find(d => d.id === id);
  const r = RESULTS[id];
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // Q&A card
  const qaCard = el('div', 'card');
  const qaHead = el('div', 'card-header');
  qaHead.appendChild(el('div', 'card-dot'));
  qaHead.appendChild(document.createTextNode('Q' + (id+1) + ' — Question & Answers'));
  qaCard.appendChild(qaHead);
  const qaBody = el('div', 'card-body');
  const qbox = el('div', 'query-box'); qbox.textContent = item.query;
  qaBody.appendChild(qbox);
  const grid = el('div', 'answers-grid');
  const nb = el('div', 'ans-box');
  nb.appendChild(el('div', 'ans-head nblm', '● NotebookLM (Baseline)'));
  const nbT = el('div', 'ans-text'); nbT.textContent = item.notebooklm; nb.appendChild(nbT);
  const df = el('div', 'ans-box');
  df.appendChild(el('div', 'ans-head dify', '● Dify Response'));
  const dfT = el('div', 'ans-text'); dfT.textContent = item.dify; df.appendChild(dfT);
  grid.appendChild(nb); grid.appendChild(df);
  qaBody.appendChild(grid);
  qaCard.appendChild(qaBody);
  main.appendChild(qaCard);

  // Scores card
  const scCard = el('div', 'card');
  const scHead = el('div', 'card-header');
  scHead.appendChild(el('div', 'card-dot'));
  scHead.appendChild(document.createTextNode('Score Details'));
  scCard.appendChild(scHead);
  const scBody = el('div', 'card-body');
  const sg = el('div', 'score-grid');
  const avg = avgScore(r);
  [
    {key:'factuality', label:'Factuality', sub:'Factuality', val:r.factuality.score},
    {key:'tone', label:'Tone & Style', sub:'Tone & Style', val:r.tone.score},
    {key:'relevance', label:'Relevance', sub:'Relevance', val:r.relevance.score},
    {key:'avg', label:'Overall Score', sub:'Overall', val:avg}
  ].forEach(d => {
    const color = scoreColor(d.val);
    const sc = el('div', 'score-card');
    sc.appendChild(el('div', 'sc-label', d.label));
    const vw = el('div', 'sc-val');
    vw.style.color = color;
    vw.textContent = typeof d.val === 'number' && d.val % 1 !== 0 ? d.val.toFixed(2) : String(d.val);
    const sp = el('span', null, '/5'); vw.appendChild(sp);
    sc.appendChild(vw);
    sc.appendChild(el('div', 'sc-sub', d.sub));
    sc.appendChild(makeHeatbar(d.val, color));
    sg.appendChild(sc);
  });
  scBody.appendChild(sg);
  const srows = el('div', 'score-rows');
  [
    {key:'factuality', label:'Factuality', sub:'Factuality'},
    {key:'tone', label:'Tone & Style', sub:'Tone & Style'},
    {key:'relevance', label:'Relevance', sub:'Relevance'}
  ].forEach(d => {
    const row = el('div', 'score-row');
    const dim = el('div', 'sr-dim', d.label);
    dim.appendChild(el('div', 'sr-dim-sub', d.sub));
    const num = el('div', 'sr-num', String(r[d.key].score));
    num.style.color = scoreColor(r[d.key].score);
    row.appendChild(dim);
    row.appendChild(makeStars(r[d.key].score));
    row.appendChild(num);
    row.appendChild(el('div', 'sr-reason', r[d.key].reasoning));
    srows.appendChild(row);
  });
  scBody.appendChild(srows);
  scCard.appendChild(scBody);
  main.appendChild(scCard);

  // Confusion matrix card
  const kp = r.kp_analysis;
  const tp = kp.hits.length, fn = kp.misses.length, fp = kp.extras.length;
  const prec = tp+fp>0 ? (tp/(tp+fp)).toFixed(2) : 'N/A';
  const rec  = tp+fn>0 ? (tp/(tp+fn)).toFixed(2) : 'N/A';
  const cmCard = el('div', 'card');
  const cmHead = el('div', 'card-header');
  cmHead.appendChild(el('div', 'card-dot'));
  cmHead.appendChild(document.createTextNode('Knowledge Point Confusion Matrix (This Question)'));
  cmCard.appendChild(cmHead);
  const cmWrap = el('div', 'cm-wrap');
  const cmSide = el('div');
  cmSide.appendChild(el('div', 'cm-axis-top', 'DIFY PREDICTED →'));
  const cmInner = el('div', 'cm-inner');
  cmInner.appendChild(el('div', 'cm-axis-side', '← BASELINE ACTUAL'));
  const table = document.createElement('table');
  table.className = 'cm';
  table.innerHTML = '<thead><tr><th></th><th>Covers (+)</th><th>Omits (-)</th></tr></thead><tbody>' +
    '<tr><th>Baseline Has</th><td class="tp">' + tp + '<span class="cm-lbl">TP</span></td><td class="fn">' + fn + '<span class="cm-lbl">FN</span></td></tr>' +
    '<tr><th>Baseline Lacks</th><td class="fp">' + fp + '<span class="cm-lbl">FP</span></td><td class="tn">—<span class="cm-lbl">TN</span></td></tr>' +
    '</tbody>';
  cmInner.appendChild(table);
  cmSide.appendChild(cmInner);
  cmWrap.appendChild(cmSide);
  const mboxes = el('div', 'metric-boxes');
  [{label:'Precision',val:prec,formula:'TP / (TP+FP)',color:'var(--accent)'},
   {label:'Recall',   val:rec, formula:'TP / (TP+FN)',color:'var(--accent2)'}].forEach(m => {
    const mb = el('div', 'mbox');
    mb.appendChild(el('div', 'ml', m.label));
    const mv = el('div', 'mv', m.val); mv.style.color = m.color;
    mb.appendChild(mv); mb.appendChild(el('div', 'mf', m.formula)); mboxes.appendChild(mb);
  });
  cmWrap.appendChild(mboxes);
  cmCard.appendChild(cmWrap);
  const kpWrap = el('div', 'kp-wrap');
  const kpBox = el('div', 'kp-box');
  const kpHead = el('div', 'kp-head');
  kpHead.appendChild(document.createTextNode('Knowledge Point Coverage Detail'));
  kpHead.appendChild(document.createTextNode(tp + ' hits · ' + fn + ' misses · ' + fp + ' extras'));
  kpBox.appendChild(kpHead);
  const kpList = el('div', 'kp-list');
  kp.hits.forEach(h => { const t = el('span','kp-tag kp-hit'); t.textContent = '✓ '+h; kpList.appendChild(t); });
  kp.misses.forEach(m => { const t = el('span','kp-tag kp-miss'); t.textContent = '✗ '+m; kpList.appendChild(t); });
  kp.extras.forEach(e => { const t = el('span','kp-tag kp-extra'); t.textContent = '⚠ '+e; kpList.appendChild(t); });
  kpBox.appendChild(kpList);
  kpWrap.appendChild(kpBox);
  cmCard.appendChild(kpWrap);
  main.appendChild(cmCard);
}

function renderSummary() {
  const main = document.getElementById('mainArea');
  main.innerHTML = '';
  let sumF=0,sumT=0,sumR=0,totalTP=0,totalFN=0,totalFP=0;
  Object.values(RESULTS).forEach(r => {
    sumF+=r.factuality.score; sumT+=r.tone.score; sumR+=r.relevance.score;
    totalTP+=r.kp_analysis.hits.length; totalFN+=r.kp_analysis.misses.length; totalFP+=r.kp_analysis.extras.length;
  });
  const n = Object.keys(RESULTS).length;
  const avgF=sumF/n, avgT=sumT/n, avgR=sumR/n, overall=(sumF+sumT+sumR)/(3*n);
  const prec = totalTP+totalFP>0 ? (totalTP/(totalTP+totalFP)).toFixed(3) : 'N/A';
  const rec  = totalTP+totalFN>0 ? (totalTP/(totalTP+totalFN)).toFixed(3) : 'N/A';
  const f1 = prec!=='N/A'&&rec!=='N/A' ? (2*parseFloat(prec)*parseFloat(rec)/(parseFloat(prec)+parseFloat(rec))).toFixed(3) : 'N/A';

  // Stats
  const sc = el('div', 'card');
  const sh = el('div', 'card-header');
  sh.appendChild(el('div', 'card-dot'));
  sh.appendChild(document.createTextNode('Overall Evaluation Results — 28/28 Complete'));
  sc.appendChild(sh);
  const sb = el('div', 'card-body');
  const sg = el('div', 'score-grid');
  [{label:'Overall Avg',val:overall,sub:'Overall avg'},
   {label:'Factuality',val:avgF,sub:'Factuality'},
   {label:'Tone & Style',val:avgT,sub:'Tone & Style'},
   {label:'Relevance',val:avgR,sub:'Relevance'}
  ].forEach(d => {
    const color = scoreColor(d.val);
    const scc = el('div', 'score-card');
    scc.appendChild(el('div', 'sc-label', d.label));
    const vw = el('div', 'sc-val'); vw.style.color = color;
    vw.textContent = d.val.toFixed(2); vw.appendChild(el('span',null,'/5'));
    scc.appendChild(vw); scc.appendChild(el('div','sc-sub',d.sub));
    scc.appendChild(makeHeatbar(d.val, color)); sg.appendChild(scc);
  });
  sb.appendChild(sg); sc.appendChild(sb); main.appendChild(sc);

  // Global CM
  const cmCard = el('div', 'card');
  const cmH = el('div', 'card-header');
  cmH.appendChild(el('div', 'card-dot'));
  cmH.appendChild(document.createTextNode('Full Confusion Matrix — Knowledge Point Coverage'));
  cmCard.appendChild(cmH);
  const cmWrap = el('div', 'cm-wrap');
  const cmSide = el('div');
  cmSide.appendChild(el('div', 'cm-axis-top', 'DIFY PREDICTED →'));
  const cmInner = el('div', 'cm-inner');
  cmInner.appendChild(el('div', 'cm-axis-side', '← BASELINE ACTUAL'));
  const table = document.createElement('table');
  table.className = 'cm';
  table.innerHTML = '<thead><tr><th></th><th>Covers (+)</th><th>Omits (-)</th></tr></thead><tbody>' +
    '<tr><th>Baseline Has</th><td class="tp">'+totalTP+'<span class="cm-lbl">TP</span></td><td class="fn">'+totalFN+'<span class="cm-lbl">FN</span></td></tr>' +
    '<tr><th>Baseline Lacks</th><td class="fp">'+totalFP+'<span class="cm-lbl">FP</span></td><td class="tn">—<span class="cm-lbl">TN</span></td></tr></tbody>';
  cmInner.appendChild(table); cmSide.appendChild(cmInner); cmWrap.appendChild(cmSide);
  const mboxes = el('div', 'metric-boxes');
  [{label:'Precision',val:prec,formula:'TP/(TP+FP) = '+totalTP+'/'+(totalTP+totalFP),color:'var(--accent)'},
   {label:'Recall',   val:rec, formula:'TP/(TP+FN) = '+totalTP+'/'+(totalTP+totalFN),color:'var(--accent2)'},
   {label:'F1 Score', val:f1,  formula:'2·P·R/(P+R)',color:'var(--warn)'},
   {label:'Total KPs',val:String(totalTP+totalFN+totalFP),formula:'across '+n+' questions',color:'var(--text)'}
  ].forEach(m => {
    const mb = el('div', 'mbox');
    mb.appendChild(el('div', 'ml', m.label));
    const mv = el('div', 'mv', m.val); mv.style.color = m.color;
    mb.appendChild(mv); mb.appendChild(el('div', 'mf', m.formula)); mboxes.appendChild(mb);
  });
  cmWrap.appendChild(mboxes); cmCard.appendChild(cmWrap); main.appendChild(cmCard);

  // Score distribution bar chart
  const distCard = el('div', 'card');
  const distH = el('div', 'card-header');
  distH.appendChild(el('div', 'card-dot'));
  distH.appendChild(document.createTextNode('Score Distribution'));
  distCard.appendChild(distH);
  const hist = [0,0,0,0,0];
  Object.values(RESULTS).forEach(r => { hist[Math.round(avgScore(r))-1]++; });
  const maxH = Math.max(...hist);
  const barChart = el('div', 'bar-chart');
  const colors5 = ['#f74f4f','#f7954f','#f7cf4f','#7ecf6e','#2dd4a7'];
  hist.forEach((cnt, i) => {
    const row = el('div', 'bar-row');
    row.appendChild(el('div', 'bar-label', String(i+1)));
    const fill = el('div', 'bar-fill');
    fill.style.background = colors5[i];
    fill.style.width = (maxH>0 ? Math.max(4, Math.round(cnt/maxH*300)) : 4) + 'px';
    row.appendChild(fill);
    row.appendChild(el('div', 'bar-count', cnt + ' qs'));
    barChart.appendChild(row);
  });
  distCard.appendChild(barChart);
  distCard.appendChild(el('div', 'summary-note', 'Click any question in the left panel to view full Q&A and detailed scores.'));
  main.appendChild(distCard);
}

renderList();
renderSummary();
</script>
</body>
</html>
