<script>
const DATA = [{"id": 0, "query": "Detailed explanation of the cancellation policy and gift voucher usage rules.", "notebooklm": "**Cancellation Policy**\nThe refund you receive depends on when you cancel and whether you participated in the cancellation fund:\n\n*   **More than 60 days before arrival:** You will receive a full refund, minus a **€30 administration fee**,,.\n*   **Between 60 and 30 days before arrival:** You will receive a partial refund. Cabiner will withhold **30% of the initial booking price plus a €30 administration fee**,,.\n*   **Within 30 days before arrival:** You are required to pay 100% of the agreed price, meaning there is **no refund**,,.\n\n**With the cancellation fund:** \nIf you purchased the cancellation fund with your booking, you can have your cancellation costs reimbursed. This only applies if you cancel due to a covered, unforeseen event and can provide valid proof, such as a doctor's note,.\n\n**Alternatives if you do not get a refund:**\nIf your situation does not qualify for a refund, you have two options:\n*   **Transfer the booking:** You can transfer your booking to family or friends completely free of charge. You just need to provide Cabiner with their names, email addresses, and phone numbers. Note that reselling the booking on online platforms (like Marktplaats or social media) is strictly prohibited,.\n*   **The voucher option:** In special circumstances, Cabiner may cancel your booking and open the dates back up for rent. If the cabin is successfully **re-rented to someone else**, you will receive a **compensation voucher** for the value of your original booking minus a €30 administration fee, instead of cash back,.\n\n***\n\n**Gift Voucher Usage Rules**\nCabiner distinguishes between purchased gift vouchers and compensation vouchers (issued by Cabiner due to cancellations or inconveniences). The following rules apply:\n\n*   **Validity:** Purchased gift vouchers are valid for **2 years** from the date of purchase,. Compensation vouchers are valid for **6 months to 1 year**,. The voucher must be redeemed to make a booking before it expires, but the **actual stay can take place after the expiration date**. \n*   **Redemption & Restrictions:** Vouchers can only be used to book stays and services, and are **not valid in the webshop**,. They can **never be exchanged for cash**,. Furthermore, reselling or trading vouchers is strictly forbidden. All voucher bookings are subject to cabin availability.\n*   **Balancing values & Price changes:**\n    *   If your booking is cheaper than the value of the voucher, the remaining balance stays on the voucher for a future purchase (it cannot be cashed out).\n    *   If your booking is more expensive than the voucher, you must pay the difference using another payment method.\n    *   **Beware of price increases:** Cabiner always applies the current rates at the time of booking,. Because prices can increase over the year, you may still need to pay a difference even if your voucher explicitly states it covers \"one overnight stay incl. meals\",.\n*   **Loss or theft:** Cabiner is not responsible for the loss, theft, damage, or unauthorized use of any vouchers, so you must keep them safe,.", "dify": "## Cancellation policy and gift voucher / voucher rules\n\nI can give you a **partial but solid overview** from what is available here. The material I have is fragmented, so I can explain the parts that are clear, but I can’t claim this is the full end-to-end cancellation policy without the complete cancellation terms.\n\n---\n\n# 1. Gift voucher vs voucher: the difference\n\n## Gift voucher (`cadeaubon`)\nA gift voucher is a written or digital document that gives the holder a **specific monetary value** to spend on Cabiner products, goods, or services.\n\nKey points:\n- it represents a **prepaid or gifted value**\n- the recipient can use it for Cabiner offerings within the applicable conditions and validity period\n\n## Voucher\nA voucher is issued by Cabiner as **compensation**:\n- for an earlier service or product that did not meet expectations\n- for a similar inconvenience or issue\n- in certain cancellation situations\n\nKey points:\n- it also represents a **monetary value**\n- it can be used for **future bookings or transactions** with Cabiner\n- vouchers are **only issued by Cabiner**\n\n---\n\n# 2. Gift voucher validity rules\n\nThe clear rules are:\n\n- A **gift voucher is valid for 2 years from the date of purchase**, unless the voucher itself states otherwise.\n- The voucher must be **redeemed/booked within those 2 years**.\n- The actual stay **does not need to take place within those 2 years**.\n\n### Example\nIf someone buys a gift voucher on **1 June 2026**, they can use it to make a booking until **1 June 2028**.  \nThat stay may still take place **after** 1 June 2028, as long as the booking was made in time.\n\n---\n\n# 3. Voucher validity rules\n\nThe material gives two related statements:\n\n- vouchers are **between 6 months and 1 year valid**\n- vouchers issued by Cabiner **as compensation for a stay** are redeemable for **1 year**\n\nThere is also a more specific operational rule:\n- these vouchers are **valid for 1 year from the moment of issue**\n- the guest can **book up to one year after issue**\n- the actual stay **does not need to happen within that year**\n\n### Example\nA booking for **20 March 2021** is cancelled on **14 January 2021**.  \nThe guest receives a voucher that can be used until **14 January 2022**.  \nThe stay itself may still take place **after** 14 January 2022, provided the booking was made before that date.\n\n## Important expiry rule\n- Once the validity period has expired, the **gift voucher or voucher lapses**\n- after expiry, it **can no longer be used**\n\n---\n\n# 4. How gift vouchers and vouchers may be used\n\nThe available rules say:\n\n- gift vouchers and vouchers can be redeemed for **Cabiner services or stays**\n- they **cannot be exchanged for cash**\n- they **cannot be used for other financial transactions**\n- a gift voucher **may not be resold or traded**\n\nThere is also an operational note that vouchers issued as stay compensation are redeemed by the guest by **making a booking themselves via the booking page**.\n\n---\n\n# 5. Cancellation policy: what is clearly available\n\nI do **not** have the complete full cancellation policy text here, but these parts are clear.\n\n## If there is no cancellation fund, or the reason is not covered\nIf the guest has **no cancellation fund**, or the reason does **not fall under the fund conditions**:\n\n### When the arrival date is not yet within 30 days\n- the cost of change/cancellation is **30% of the original price + €30 administration fee**\n\n### When the arrival date is within 30 days from now\n- the cost of cancellation is **100% of the original price**\n\nThere is also an operational instruction:\n- if arrival is within 30 days, check or ask whether the guest has a **cancellation fund**\n- if they do have one, ask for **proof**\n- if proof is provided, the cancellation fund can be applied\n- if not, the “no cancellation fund” rules apply\n\n---\n\n# 6. Voucher option in cancellation cases\n\nThere is a specific **voucher option** that can sometimes be used.\n\n## What it means\n- Cabiner cancels the booking\n- the dates become available again for other guests\n- **if this succeeds**, Cabiner charges **€30 administration fee**\n- the guest receives a **voucher with the value of the original booking**\n\n## When it may be used\nThis option is mainly used when:\n- a guest is very unhappy and does not agree with the standard cancellation outcome\n- there are **special circumstances** that make a stay difficult or impossible\n- the team decides this is appropriate\n\nThere is also a note that this was easier to do during the corona period, and that filling nights is now more difficult.\n\n## If a guest cancels again after already receiving a voucher\nThere is a specific rule for repeat voucher situations:\n\n- if a guest previously cancelled a booking and received a voucher\n- then made a new booking\n- and then needs to cancel or move that new booking again\n\nThen:\n- Cabiner charges **another €30 administration fee**\n- a **new voucher** is issued\n- that new voucher is again **valid for 1 year from that moment**\n\n---\n\n# 7. Alternative to cancellation: transfer to friends or family\n\nA useful operational detail:\n- transferring the booking to **friends or family is free**\n\nThis can be a good alternative if the guest cannot come but wants to avoid the normal cancellation outcome.\n\n---\n\n# 8. Practical internal summary\n\n## Cancellation\nWhat is clearly available:\n- **No fund / reason not covered, more than 30 days before arrival:**  \n  **30% of original price + €30 admin fee**\n- **No fund / reason not covered, within 30 days before arrival:**  \n  **100% cancellation cost**\n- **With cancellation fund:**  \n  ask for **proof**; if accepted, the fund can be applied\n- **Voucher option:**  \n  possible in some cases, with **€30 admin fee**, and issue a voucher equal to the original booking value if the booking can be cancelled and reopened\n\n## Gift vouchers\n- valid **2 years from purchase**\n- must be used/booked within that period\n- stay may take place later\n- not redeemable for cash\n- not for resale/trading\n\n## Vouchers\n- issued by Cabiner\n- used for future bookings/transactions\n- validity stated as **6 months to 1 year**, and for stay-compensation vouchers specifically **1 year**\n- must be redeemed/booked within validity\n- stay may take place later\n- not redeemable for cash\n\n---\n\n# 9. What is still missing\n\nI do **not** have the full cancellation policy wording here, so these details are still not fully confirmed from the material available to me:\n\n- the complete structure of cancellation terms across all time windows\n- the exact full rules of the cancellation fund\n- whether modifications and cancellations always follow the same percentages in every scenario\n- any exceptions beyond the voucher option and proof-based cancellation fund process\n\nIf you want, I can also turn this into one of these formats:\n1. a **customer-friendly explanation**\n2. an **internal agent cheat sheet**\n3. a **decision tree for support agents**"}, {"id": 1, "query": "How do I use a voucher?", "notebooklm": "You can use your gift voucher or compensation voucher by making a reservation in advance for a stay or service via the Cabiner website, following the instructions provided on the voucher document. Please keep in mind that all reservations are always subject to cabin availability.\n\n**How the voucher value is applied:**\n*   **If your booking is cheaper** than the value of the voucher, the remaining balance will be kept on the voucher for future bookings. This remaining balance cannot be paid out in cash.\n*   **If your booking is more expensive** than the value of the voucher, you must pay the remaining difference using another available payment method.\n*   **Beware of price increases:** Cabiner always applies the current rates at the time of booking. Because prices can increase over the year, you may need to pay an additional amount, even if your voucher explicitly states it covers \"one overnight stay incl. meals\".\n\n**Important rules for redeeming vouchers:**\n*   Vouchers can only be used for Cabiner stays and services, and are **not valid in the webshop**.\n*   They can **never be exchanged for cash**.\n*   It is strictly prohibited to resell or trade your voucher.", "dify": "## How a voucher is used\n\nA voucher is used by **making a booking yourself via the booking page**.\n\n### Key rules\n- Vouchers can be redeemed for **Cabiner services or stays**.\n- They are **not exchangeable for cash** or other financial transactions.\n- They are **issued only by Cabiner**.\n- For vouchers issued as compensation for a stay, the voucher is generally **redeemable for 1 year**.\n- The voucher must be **used within its validity period**.\n- The actual stay can take place **after the validity period**, as long as the booking was made in time.\n\n### If a guest cannot find a date\nIf someone wants to redeem a voucher but cannot find a suitable new date because availability is full:\n- tell them that **new Cabins may become available soon**\n- let them know they can be **kept informed when these become bookable**\n- ask for their **email address**\n- **tag Eva** so they can be placed on the **VIP list**\n- they can also be informed about **last-minute availability**\n\n### Important limitation\nOnce the validity period has expired, the voucher **expires and can no longer be used**.\n\nIf you want, I can also turn this into a **guest-facing reply template** for email or chat."}, {"id": 2, "query": "where can I park my car", "notebooklm": "Parking directly next to your cabin is not possible, but you will receive specific information about parking locations and walking routes after you complete your booking. \n\nDepending on the nature reserve you are visiting, you can park your car at the following designated locations:\n\n*   **Ruiten Aa:** You can park at **P1** behind the large chimney near the organic butcher 'Woeste Grond' (Ter Apelerstraat 16, Sellingen). If you prefer a shorter walking route, you can park at **P2** in the center of Sellingen (Dorpstraat 1).\n*   **Drentsche Aa:** Park at **P1** near the Staatsbosbeheer office (Ieberen 1, Elp), making sure to use the first parking lot on your right. If you are staying in cabins C4, C5, C6, or C8, you also have the option to park at **P2** near the Boomkroonpad outdoor center (Steenhopenweg 4, Drouwen). Please note that it is strictly forbidden to drive your car into the nature reserve toward the cabins.\n*   **Horsterwold (Stille Kern):** For longer 6 to 8 km routes, park at **P1** (opposite Groenewoudseweg 70 in Zeewolde). For shorter 2 to 5 km routes, park at **P2** (Parkeerplaats Horsterwold, Groenewoudseweg 7 in Zeewolde).\n*   **Sallandse Heuvelrug:** Your walk will start from **P1** at the Staatsbosbeheer outdoor center (Grotestraat 281, Nijverdal). You can also use **P2** for a shorter route, but be aware that overnight parking is no longer allowed at P3.\n*   **Dwingelderveld & Ruinen:** Park at **P1** at the former Planetron (Drift 11 C, Dwingeloo). For a shorter walk to cabin C1, you may park at **P2** (Zuidwolderweg 2, Echten), but you must exclusively use the 5 specific parking spaces along the main road, and do not park at the Brink or P3.\n*   **Het Hogeland (Basecamp):** Park your car in the parking lot of the monumental farm Enne Jans Heerd (Maarhuizen 3, Winsum), which also features a charging station for electric vehicles.\n*   **Lauwersmeer (Basecamp):** Guests currently have temporary permission from Staatsbosbeheer to park just north of the basecamp at **Rijsdammen 1** in Kollumerpomp. If you do this, you **must** leave a note with 'Cabiner' written on it behind your windshield. For longer walking routes, you can also park at **P2** or **P3**.", "dify": "## Parking\n\nGuests receive the **parking location information after booking**.\n\n### Main rule\n- **Parking next to the cabin is not possible.**\n- Parking options **differ by area**.\n- From the parking spot, there may be a **shorter or longer walking route** to the cabin.\n\n### Extra internal detail for Basecamp in Kollumerpomp\nThere is a specific note for the Basecamp at **Rijsdammen 2, Kollumerpomp**:\n\n- There were issues with use of the small parking area near the **Reitdomp lookout tower**.\n- If that parking area is being used in situations where it should not be, this should be **reported via WhatsApp to the helpdesk** so enforcement can be engaged.\n- Due to this parking situation, Cabiner visitors have been given **temporary permission to park closer by**, slightly north of the Basecamp at **Rijsdammen 1**.\n\nIf you want, I can also rewrite this as:\n- a **guest-facing message**\n- an **internal support answer**\n- or a **location-specific parking summary** if you tell me which area or cabin you mean."}, {"id": 3, "query": "How do I get to the cabins from the parking lots?", "notebooklm": "Cabiner locations are off-grid and primarily designed to be reached **on foot**, though some specific locations are also accessible by canoe or bicycle. After you complete your booking, you will receive detailed route information, maps, and GPS files to help you navigate through the nature reserves.\n\nDepending on your booked location, here is how you will reach your cabin from the designated parking lots:\n\n*   **Ruiten Aa:** From P1, you start your hike by walking through the gate at the end of the parking lot. If you start from P2, the route takes you less through the dense forest and more along pastures. You can choose between walking routes of 3, 7, or 12 kilometers.\n*   **Drentsche Aa:** You hike from P1 or P2. Please keep in mind that it is **strictly forbidden to drive your car into the nature reserve** toward the cabins, and fines are issued for doing so.\n*   **Horsterwold (Stille Kern):** After a hike of 2 to 8 kilometers (depending on which parking lot you choose), you will arrive at a wooden jetty by the water. From there, you are required to put on a life jacket and make a **short canoe trip of about 100 meters** to reach the floating cabin.\n*   **Sallandse Heuvelrug:** You will hike into the forest from P1 or P2. Because the cabins are extremely well hidden in the landscape, it is **strictly forbidden to arrive after sunset**. You will not be able to find the cabin in the dark.\n*   **Dwingelderveld & Ruinen:** The hike from P1 to cabin C1 is a longer trek of about 16 kilometers. You can shorten this route significantly to about 7 kilometers by parking and starting your walk from P2.\n*   **Het Hogeland (Basecamp):** From the parking lot, you walk behind the monumental farm and follow the brick path, which is also part of the famous Pieterpad walking trail. You will find the cabins down by the water on your right-hand side.\n*   **Lauwersmeer (Basecamp):** You can reach this basecamp via a **short 3-kilometer walk from P1, a longer hike from P2 or P3, or even by bicycle**. You enter the basecamp area by crossing a small bridge over the water.\n*   **Noord Veluwe (Basecamp / Zwolse Bos):** This location requires only a **short 15-minute walk** (about 1 kilometer) from the parking area. You start at 'het Pompstation' (the pumping station) and walk straight through the forest via an old, long water trench known as the 'kret'.", "dify": "## Getting from the parking lot to the cabins\n\nThe cabins are **not reached by car**. Guests park at the designated parking location and continue **on foot** to the cabin. In some cases, access may also be **by canoe**, but the material here mainly confirms walking access.\n\n### What to tell guests\n- The **exact parking location is shared after booking**.\n- **Parking next to the cabin is not possible**.\n- The route from the parking area to the cabin can be a **short or longer walk**, depending on the area.\n- The cabins are intentionally located in **special nature areas**, so access is part of the stay experience.\n\n### Walking distance and duration\nThe distance from the parking place to the cabins varies by location:\n\n- **1 to 15 km**\n- Depending on walking pace, this is roughly **1 to 3 hours**\n\nThere are also exceptions where the walk is much shorter:\n\n- **Basecamp Noord Veluwe**\n- **Basecamp Het Hogeland**\n- **Natuurgebied Kuinderbos**\n\nFor these locations, the cabins are **closer together** and lie about **1 km from the parking place**.\n\n### Why access works this way\nThe cabins are placed in nature areas and are:\n- **self-sufficient**\n- placed on **temporary locations**\n- intended to have a limited impact on the surroundings\n\nThat is why the cabin is **only accessible on foot** (or in some cases by canoe), rather than directly by car.\n\n---\n\n## Specific route detail for Basecamp Het Hogeland\n\nFor **Cabiner Basecamp on the wierde Maarhuizen**:\n\n- Address: **Maarhuizen 3, 9951 TB Winsum**\n- When entering the grounds via **Maarhuizen**, walk **behind the farm**\n- Follow the **brick path parallel to the farm**; this is the **Pieterpad**\n- The cabins are located **down by the water on the right-hand side**\n- **C1** is the cabin **closest to the farm**\n- **C2** is **west of C1**\n- Seen from the front of the cabins:  \n  - **C1 = left cabin**  \n  - **C2 = right cabin**\n\n---\n\n## Short internal summary\n- Guests receive parking details **after booking**\n- They **cannot park beside the cabin**\n- They continue **walking from the parking lot**\n- Typical route length: **1–15 km / 1–3 hours**\n- Shorter walk for **Basecamp Noord Veluwe, Basecamp Het Hogeland, Kuinderbos**: about **1 km**\n- One known detailed walking route is available for **Maarhuizen / Het Hogeland**\n\nIf you want, I can also turn this into a **guest-ready support reply** or a **location-by-location arrival script**."}, {"id": 4, "query": "Where can I pick up my pre-ordered meals?", "notebooklm": "Generally, your pre-ordered meals will be ready for you to pick up at the starting point **P1** of your hike, usually in a special refrigerator or cabinet. The exact pick-up location depends on the nature reserve you booked:\n\n*   **Ruiten Aa:** You can pick up the meals at P1 (Ter Apelerstraat 16, Sellingen). They are available from 12:00 PM (from 1:00 PM on Mondays) in the refrigerator with the Cabiner logo, located behind the large chimney.\n*   **Drentsche Aa:** The meal packages can be picked up at P1 from 12:00 PM (from 1:00 PM on Mondays) near the Staatsbosbeheer office at Ieberen 1 in Elp.\n*   **Sallandse Heuvelrug:** The meals are located in the Cabiner cabinet at the Buitencentrum (P1). From the main entrance, walk around the building to the left; the cabinet is located there under a shelter.\n*   **Dwingelderveld & Ruinen:** You will find your meal package in the Cabiner cabinet at P1 (the former Planetron). Walk around the building to the right from the entrance of the terrain; the cabinet is against the wall just before you turn the corner.\n*   **Noord Veluwe (Basecamp / Zwolse Bos):** For this basecamp, meals are not located at the parking lot. Instead, you can pick them up at the small stone house (**steenhuisje**) directly on the basecamp terrain.\n\n**Please note:** It is currently not possible to order meals at **Het Hogeland, Lauwersmeer, and Horsterwold**, so you will need to bring all your own food for your stay at these specific locations.", "dify": "## Pickup location for pre-ordered meals\n\nIn most cases, **pre-ordered meals are placed in a refrigerator at the walking route’s start point P1**.\n\n### Important location-specific details\n- **General rule:** meals are ready at **start point P1**.\n- **Basecamp Noord-Veluwe:** meals are ready **on the terrain itself**.\n- **Buitencentrum location:** the **trekking map and meals are in the Cabiner cabinet**.  \n  You find it by **walking left around the building from the main entrance of the Buitencentrum**. Under a canopy, there is the **Cabiner cabinet** with the meals inside.\n- **Ruiten Aa:** meals can be picked up at **P1, Ter Apelerstraat 16, Sellingen**.  \n  - Available from **12:00 on the day of arrival**\n  - On **Mondays from 13:00**\n  - They are in the **fridge with the Cabiner logo**, **behind the large chimney** on the property.\n\n### Availability / exceptions\nIt is **not possible to order meals** at:\n- **Het Hogeland**\n- **Lauwersmeer**\n- **Horsterwold**\n\n### Extra operational notes\n- Guests can find the meal recipes in the **recipe booklet in the cabin**.\n- Meal add-ons can be booked up to:\n  - **10 days before arrival** depending on location, and elsewhere it is also stated as\n  - **7 days before departure** via **cabiner.co/wijzigboeking**\n\nIf you want, I can also turn this into a **guest-facing reply template** for support/chat."}, {"id": 5, "query": "Can I get a refund if I cancel my booking?", "notebooklm": "Whether you can get a refund for your cancelled booking depends on how far in advance you cancel and whether you participated in the cancellation fund. \n\n**Standard Cancellation Policy (without the cancellation fund):**\n*   **More than 60 days before arrival:** You will receive a full refund, minus a **€30 administration fee**.\n*   **Between 60 and 30 days before arrival:** You will receive a partial refund. Cabiner will withhold **30% of the initial booking price plus a €30 administration fee**.\n*   **Within 30 days before arrival:** You are required to pay 100% of the agreed price, meaning **no refund will be issued**.\n\n**With the Cancellation Fund:**\nIf you opted into the cancellation fund when making your booking, you can have your cancellation costs reimbursed. However, this only applies if you are cancelling due to a covered, unforeseen event and you can provide valid proof, such as a doctor's note.\n\n**Alternatives if you do not qualify for a refund:**\nIf you fall outside the refund window, you still have two options to make sure your booking doesn't go to waste:\n*   **Transfer your booking for free:** You are allowed to transfer your reservation to friends or family free of charge. You simply need to provide Cabiner with their names, email addresses, and phone numbers. Please be aware that reselling your booking on online platforms (like Marktplaats or social media) is strictly prohibited and will result in immediate cancellation without a refund.\n*   **The voucher option:** In certain situations, Cabiner can cancel your booking and open your dates back up for rent. If they are successfully able to **re-rent the cabin to someone else**, you will receive a compensation voucher for the value of your original booking minus a €30 administration fee. You will not receive cash back, and the voucher will be valid for 1 year.", "dify": "## Refunds when a booking is cancelled\n\nThat depends on **whether the guest has an annuleringsverzekering / annuleringsfonds** and **whether there is a valid reason**.\n\n## 1) Guest has cancellation insurance/fund **and** a valid reason\nThen the guest **can get their money back** under the cancellation conditions.\n\n### Important details\n- Valid reasons are the ones listed in the **cancellation conditions**.\n- If money is refunded, it is **with deduction of**:\n  - the **annuleringsfonds / cancellation fund**\n  - **€30 wijzigings-/administration costs**\n\n### Corona exception\nIf one of the guests is **sick at home with corona**, this **does count** under the cancellation insurance/fund.\n\nThen you should ask for:\n- a **doctor’s statement**, or\n- a **positive test with date** of the guest(s)\n\n## 2) Guest has cancellation insurance/fund, but **no valid reason**\nThen the guest **does not get a cash refund**.\n\nWhat you can offer:\n- a **voucher**\n\nThis often needs extra explanation, and you should also refer them again to the **conditions of the cancellation insurance**.\n\n## 3) Guest has **no** cancellation insurance/fund, but **does** have a valid reason\nExamples mentioned:\n- **death**\n- **serious accident in close family / close circle**\n- other cases that are reviewed **case by case**\n\nIn these situations:\n- you can say that we can offer a **voucher**\n- if the guest strongly insists on a cash refund, you can **check internally**, but **in principle we do not do this**\n\n## 4) Guest has **no** cancellation insurance/fund and **no** valid reason\nThen the guest **does not get a cash refund**.\n\nWhat you can offer:\n- first direct them to **cabiner.co/wijzigboeking**\n- if they object to the high change costs and email afterward, a **€30 voucher** can be offered\n\n## Special case: foreign guests with an exit ban\nIf guests from abroad cannot enter the Netherlands because of an **uitreisverbod / travel restriction**, they **do not have a right to a refund**, whether they booked cancellation insurance/fund or not.\n\nReason:\n- we did **not** cancel the stay\n- they want to cancel/change it themselves\n- therefore they **do not have a legal right to their money back**\n\n## If a voucher had already been issued before\nIf a guest:\n1. previously cancelled a booking and received a voucher,\n2. then made a new booking,\n3. and now wants to cancel/change again,\n\nthen:\n- we charge **another €30 administration fee**\n- we issue a **new voucher**\n- that new voucher is valid for **1 year from the new issue date**\n\n## Voucher validity\n- Vouchers are valid for **1 year**\n- The guest must **book within that year**\n- The actual stay **does not need to take place within that year**\n\nExample:\n- booking cancelled on **14 January 2021**\n- voucher valid until **14 January 2022**\n- stay may still take place **after 14 January 2022**, as long as it was booked in time\n\n## Internal handling notes\nFor cancellations:\n- **always tag Eva**\n- refunds are processed on **weekdays**\n- target is to refund within **2 days**\n- after that, it depends on the **bank** when the money appears in the guest’s account\n\n## Mews handling notes for insured cancellations\nIf you need to process an insured cancellation in Mews:\n\n### Check first\n- In **Mews**, check whether they have the **Annuleringfonds**\n- In the **action log** and the **email**, check the cancellation date\n\n### If the stay is **60+ days away**\n- Add **€30 admin costs**  \n  - `Billing > Add product > cancellation fee > 30 euro`\n- Refund via:\n  - **Mollie** if paid through Mollie\n  - and/or **gift card dashboard** if paid with a gift card\n- Then go back to **Billing in Mews**\n- Use the arrow next to **Process payment**\n- Enter the refunded amount as a **negative amount**  \n  - example: `-400€`\n- Billing should then be **balanced**\n\n### If the stay is **between 60 and 30 days away**\nThe material confirms:\n- add **€30 admin costs**\n- charge **30% of the total price**\n\nThe rest of that step is not fully visible in the material, so I would not state more definitively than that.\n\n---\n\n## Short answer for guest-facing use\nYou can tell a guest:\n\n- **Refund is possible only in specific cases**\n- If they have **cancellation insurance/fund and a valid reason**, they can usually get a refund minus the **annuleringsfonds and €30 costs**\n- In most other cases, we offer a **voucher instead of a cash refund**\n\nIf you want, I can also turn this into:\n- a **short Trengo reply**\n- a **decision tree**\n- or a **step-by-step internal cancellation script**."}, {"id": 6, "query": "How do I sign up for the VIP waiting list?", "notebooklm": "You can sign up for the VIP waiting list in two ways:\n\n*   **Via the website:** You can easily sign up yourself for the waiting list and newsletter directly on the **homepage of the Cabiner website**. \n*   **Through customer service (when redeeming a voucher):** If you are trying to redeem a voucher but cannot find an available date because everything is fully booked, you can reach out to customer service. By **providing them with your email address**, they can manually add you to the VIP list. This ensures you will be among the first to be notified when new cabins or dates become available to book.", "dify": "## VIP waiting list sign-up\n\nThe material does **not show a self-service internal sign-up process** for adding yourself directly. What it *does* show is **how guests are added** and **who to involve**.\n\n### What is confirmed\nGuests can be placed on the **VIP list** in situations such as:\n- when they want to **redeem a voucher**\n- but **cannot find a new date**\n- because availability is very limited\n\nIn that case, you can tell them:\n- that **new cabins are coming soon**\n- that you will **keep them informed when these become bookable**\n- so they can **reserve a spot first**\n\n### How to add someone\nThe instruction shown is:\n\n- **ask for their email address**\n- **tag Eva**\n- then they are added to the **VIP list**\n\n### Important internal context\nThere are references to:\n- the VIP list for **new cabins becoming available**\n- and the VIP list for **last-minute nights being released**\n\nThere is also a separate process for **mailing the waiting list via Brevo**, but the available material only clearly confirms:\n- the mailing is done in **Brevo**\n- contact data of newsletter and waiting-list subscribers are stored there\n- people sign up for this **via the website**\n- access to Brevo is with login details obtained via **Sander**\n\n## Practical answer\nIf you want to put someone on the VIP waiting list:\n1. **Ask for their email address**\n2. **Tag Eva**\n3. They can then be added to the VIP list\n\n## What is missing\nThe material does **not clearly show**:\n- a dedicated employee form or system for self-registering someone\n- whether there is **one single VIP list** or multiple separate lists in practice\n- the exact **Brevo list name**\n- the exact clicks needed to manually add one contact\n\nIf you want, I can help you draft:\n- a **guest-facing message**\n- an **internal SOP based only on what is confirmed**\n- or a **follow-up question list for Eva/Sander** to complete the process documentation."}, {"id": 7, "query": "Are there charging stations for electric cars at every location?", "notebooklm": "No, **charging stations are not available at every specific parking location** for the cabins. \n\nHowever, there are various charging points located near the nature reserves where Cabiner operates. The sources recommend **using the ANWB website to plan your route** and easily locate available charging stations along the way.\n\nThe sources highlight specific charging information for two locations:\n*   **Het Hogeland (Basecamp):** There is a charging station available right at the designated parking lot (at the monumental farm Enne Jans Heerd) where you can charge your electric car.\n*   **Drentsche Aa:** There is a charging station at parking lot P2. However, guests are explicitly requested **not to leave their cars connected to this charging station overnight**, as charging points in this specific area are very scarce.", "dify": "## Short answer\n\n**No, not at every location.**\n\n## What you can say confidently\n\n- There are **various charging points near the nature areas** where Cabiner operates.\n- Guests can use the **ANWB route planner for electric cars** to plan charging stops.\n- At **P2 in Drentsche Aa**, guests should **not leave their car overnight at the charging point**, because charging options there are limited.\n- For **Het Hogeland / Maarhuizen**, there **is** a charging station at the parking area:\n  - **Enne Jans Heerd**\n  - **Maarhuizen 3, 9951 TB Winsum**\n\n## Important nuance\n\nThe available information confirms:\n- **nearby charging options exist in multiple areas**\n- **at least one specific location has a charging station at the parking lot**\n\nBut it does **not** confirm that **every location** has its **own on-site charging station**. So you should **not promise that all locations offer this**.\n\n## Best guest-facing phrasing\n\nYou can say:\n\n> There are several charging points near the nature areas where we operate, but not every location has its own charging station. Guests can best plan their trip in advance using the ANWB EV route planner. For P2 in Drentsche Aa, we ask guests not to leave their car overnight at the charging point, since charging options there are scarce.\n\nIf you want, I can also turn this into a **short FAQ reply** or a **support macro**."}, {"id": 8, "query": "Tell me more about the floating cabin at Horsterwold.", "notebooklm": "The floating cabin in the Horsterwold is located in the 'Stille Kern', a 900-hectare nature reserve where nature is allowed to run its course and where there are almost no paths. A stay at this unique location is designed for true adventurers and requires good preparation. \n\nHere are the most important details about staying in this floating cabin:\n\n*   **Arrival by canoe:** After a hike of 2 to 8 kilometers, you will arrive at a wooden jetty. From here, you must make a **short canoe trip of about 100 meters** to reach the cabin, which literally floats on a small lake. You will moor the canoe right at your front door.\n*   **Safety rules:** Because the cabin is situated on the water, **good swimming skills are strictly required** and you are obligated to wear the provided life jackets while canoeing. For safety reasons, **children up to 5 years old are not allowed** to stay here or join the canoe trip.\n*   **Keys and equipment:** You will not find the paddles, life jackets, and cabin keys right at the canoe; instead, they are stored in a special chest near a small bridge. The canoe, the chest's keybox, and the cabin's backup keybox all use the **same code: 2305**. \n*   **Drinking water:** The water from the tap in this cabin is pumped directly from the surface water the cabin floats on, and its quality is lower than at other locations. It is not drinkable, so you are strongly advised to **bring and exclusively use your own bottled water for all consumption**.\n*   **Food and firewood:** Because the cabin floats, Cabiner cannot store large, heavy supplies of firewood in it. You must **transport your own firewood daily in a bag** from the chest near the bridge to your cabin using the canoe. Additionally, it is **not possible to order meal packages** for the Horsterwold location, meaning you must bring all the food for your stay yourself.\n*   **Completely off-grid:** You will have extremely poor to no mobile phone reception at this location. The cabin is only cleaned by the maintenance team once every two weeks, so you are completely self-sufficient and responsible for leaving the cabin swept and tidy for the next guests.", "dify": "## Horsterwold floating cabin overview\n\nThe floating cabin at **Horsterwold (Stille Kern)** is a very distinctive Cabiner location in an area with a lot of **untouched nature**. A few practical points are especially important when explaining this stay to guests.\n\n## Key things to communicate\n\n### 1. Access to the cabin\n- You **must reach the cabin by canoe**.\n- There is a **short canoe trip of about 10 minutes**.\n- There is also a **longer possible route of up to 5 hours**.\n\nThis makes the stay quite different from the standard hike-to-cabin experience, so it is worth emphasizing clearly in guest communication.\n\n### 2. Water\n- The water in this cabin is **not drinking water**.\n- For **Horsterwold C1**, the cabin uses water taken from the **surface water** the cabin floats on.\n- The water quality is **lower than in the other cabins**.\n- Guests should be advised to **use their own brought drinking water for consumption only**.\n\nThis is an important point to state very explicitly.\n\n### 3. Mobile phone coverage\n- **Mobile reception is very poor** around this cabin.\n- With some providers, there may be **no coverage at all**.\n- Guests should be told to **check their provider’s coverage in advance**.\n\n## Walking routes and starting points\n\nThere are **two starting points** for the walking routes:\n\n### P1\nFor the longer routes:\n- **6 km and 8 km routes start from P1**\n- Address: **opposite Groenewoudseweg 70 in Zeewolde, opposite Terra Wolde**\n\n### P2\nFor the shorter routes:\n- **2 km and 5 km routes start from P2**\n- Address: **Parkeerplaats Horsterwold, Groenewoudseweg 7 in Zeewolde**\n\n## Public transport access\nBoth P1 and P2 are reachable by **bus 142 toward Harderwijk from Nijkerk NS Station**.\n\n### For P1\n- Get off at **“Bolwerk”**\n- Then walk **about 30 minutes**\n\n### For P2\n- Get off at **“Nulderpad”**\n- Then walk **about 15 minutes**\n\n### Alternative start\n- Guests can also start their walk from **Ermelo station**\n- Distance is **about 11 km**\n\n## Useful links\n- Info page: **https://www.cabiner.com/infohw**\n- Area/stay page: **https://www.cabiner.com/horsterwold**\n\nThere is also a general guidance point for service: if a guest has many preparation questions, especially about routes, you can direct them to the Horsterwold info page:\n- **https://www.cabiner.com/infohw**\n\n## Practical internal summary\nIf you need to explain Horsterwold briefly to a guest, the core message is:\n\n- **Floating cabin in a wild, quiet nature area**\n- **Access by canoe**\n- **Non-drinking water, so bring and use your own drinking water**\n- **Very limited or absent mobile coverage**\n- **Two route starting points: P1 for longer walks, P2 for shorter walks**\n\nIf you want, I can also turn this into:\n- a **guest-facing reply template**\n- a **short internal cheat sheet**\n- or a **Dutch version for customer service use**."}, {"id": 9, "query": "What should I bring for the Horsterwold cabin?", "notebooklm": "For your stay at the floating cabin in the Horsterwold, you will need the standard Cabiner packing list along with a few crucial items specific to this unique water location. Because you must carry everything yourself during the hike and the canoe trip, packing efficiently is important.\n\n**Crucial items specifically for the Horsterwold cabin:**\n*   **All your drinking water:** The tap water in this cabin is pumped directly from the surface water the cabin floats on and is not drinkable. You are strongly advised to **exclusively use your own bottled water for all consumption**.\n*   **All your food:** It is currently not possible to order meal packages for the Horsterwold location, meaning you must bring all the food for your entire stay yourself.\n*   **A larger backpack:** Because you will be carrying all your heavy food and drinking water, a larger backpack of **50 to 60 liters** is highly recommended (instead of the standard 30 liters).\n*   *Note on firewood:* You do not need to bring firewood from home. However, you will need to transport your daily wood in a provided bag from a chest near the bridge to your cabin using the canoe.\n\n**Standard Cabiner packing list:**\n*   **Bedding:** A sleeping bag, a fitted sheet (for a 160 cm wide mattress), and a pillowcase.\n*   **Towels:** Bath towels, a tea towel, and a dishcloth.\n*   **Practical gear:** A flashlight, a powerbank (the cabin's USB port may not work if there has been little sunlight), and a raincoat.\n*   **Footwear:** Sturdy walking shoes, and boots if it has been raining a lot.\n*   **Summer essentials:** Mosquito repellent, if you are staying between May and September.\n\nAdditionally, there is no waste disposal service at the cabins; you are required to **take all of your own trash back with you** to the starting point.", "dify": "## What to bring for the Horsterwold cabin\n\nFor Horsterwold, guests should be prepared well. This cabin is in a more adventurous area, has **very limited mobile reception**, and the cabin water is **not drinking water**.\n\n### Recommended to bring\n- **Flashlight**\n- **Power bank**\n- **Anti-mosquito spray** *(from May to September)*\n- **Walking shoes**\n- **Boots** *(if it has rained a lot)*\n- **Backpack of at least 30L**\n- **Rain jacket**\n- **Food**\n- **Drinking water**\n\n### If the guest ordered a meal package\n- They should keep space in or on their backpack for a **shopping bag of about 3 kg per day**\n- In that case, a **larger backpack of 50–60L is recommended**\n- It can also be useful to bring a **container** to take leftovers home\n\n## Drinking water: important for Horsterwold\nThis is especially important for this cabin:\n\n- The water in Horsterwold is **not drinkable**\n- Guests are advised to bring **at least 1 liter of drinking water per person**\n- For **Horsterwold C1**, guests are advised to **use only their own brought drinking water for consumption**\n- For **small children**, during **pregnancy**, or with **reduced immunity**, the advice is to use **only brought drinking water**\n\n## What is already available in the cabin\nGuests do **not** need to bring these items unless they want extras:\n\n- **2 double beds** with mattresses and pillows\n- **Plates, cups, cutlery, cast-iron pan, spatula**\n- **Cool drawer** *(in summer)*\n- **Coffee maker (percolator), teapot, coffee and tea**\n- **Stanley 0.5L thermos**\n- **Wood stove**, including:\n  - firewood\n  - matches\n  - fire starters\n- **Dish soap, waste bags, dustpan and brush**\n- **Olive oil, pepper, salt and herbs**\n- **First aid kit and tick remover**\n- **Fire extinguisher and fire blanket**\n- **CO2 and fire detector**\n- **Eco shower gel/shampoo and toilet paper** *(biodegradable)*\n- **USB charging port for phone**\n- **Spare battery lamp**\n- **No Wi-Fi**\n\n## Extra point for Horsterwold specifically\nBecause this is a more rugged and off-grid area:\n- guests should come with the **right equipment**\n- they should expect a more **adventurous stay**\n- mobile phone coverage can be **very poor or absent**\n\nIf you want, I can also make this into a **guest-ready packing reply** you can send directly."}, {"id": 10, "query": "Are dogs allowed at the cabins?", "notebooklm": "**No, dogs and other pets are unfortunately not allowed in the cabins**. \n\nThis strict policy is in place for the well-being of the local wildlife. The scent of dogs is enough to keep wild animals away, which goes against Cabiner's goal of providing guests with the ultimate experience of observing wildlife directly around their cabin. \n\nCabiner understands that this is disappointing for dog owners, and they are currently **working with Staatsbosbeheer to find new locations** where it might be possible to bring a dog in the future.", "dify": "## No, dogs are not allowed at the cabins.\n\nThis is stated clearly in multiple places:\n\n- **Dogs are not allowed to/in the cabin.**\n- **Pets are not allowed at the cabins.**\n- This also applies in the different areas, including locations where guests reach the cabin by canoe.\n\n## Reason for the policy\n\nThe reason given is **fauna welfare and ecology**:\n\n- The **smell of dogs causes wildlife to stay away**.\n- Cabiner wants guests to be able to **observe wild animals around the cabins** as part of the experience.\n- It is also **not ecologically justifiable toward municipalities and the province**.\n\n## Extra context for guest communication\n\nThere is also wording available that acknowledges this may be disappointing for dog owners:\n\n- Cabiner understands this is unfortunate for guests with dogs.\n- There is mention that Cabiner is **exploring new areas together with Staatsbosbeheer where this may be possible in the future**.\n\n## Short internal answer you can use\n\n**No, dogs and other pets are not permitted at Cabiner cabins. This is due to fauna welfare and ecological considerations: the presence and scent of dogs disturb wildlife, while the experience is intended to let guests enjoy nature and wildlife around the cabins.**"}, {"id": 11, "query": "What does the VIP list notification include?", "notebooklm": "The VIP list notification (also known as the waiting list email) is primarily used to keep subscribers informed about cabin availability, as Cabiner does not notify guests individually when a specific spot becomes available. \n\nThese emails typically include the following:\n\n*   **Last-minute availability:** When other guests have to cancel their bookings at the last minute, Cabiner tries to re-rent these freed-up nights by offering them to the waiting list.\n*   **Reminders for open nights:** If there are still relatively many unbooked nights left about a week in advance, an email is sent out to alert subscribers to this availability.\n*   **Discounts and seasonal content:** The emails can feature special offers or discounts, and the texts and photos included in the message are often tailored to match the atmosphere of the current season.", "dify": "## What the VIP list notification includes\n\nThe material available only gives a **partial answer** here. What can be established is:\n\n- Guests can be placed on a **VIP list** to help them find new dates to redeem a voucher.\n- There are **at least two relevant VIP-list functions** mentioned:\n  - a list that lets guests know **when new cabins become available**\n  - a VIP list through which **last-minute stays are released**\n\n## Context around this\n\nThis appears in the context of guests who want a **voucher** instead of their original booking:\n\n- Changing the booking and issuing a voucher comes with **€30 administration costs**\n- That voucher option is **not something Cabiner has to accept in all cases**\n- The €30 fee is described as covering real administrative work, such as:\n  - creating the voucher\n  - re-renting the night\n  - sending emails\n  - other administrative handling\n\n## What is not clear from the material\n\nThe exact **content or wording of the VIP list notification itself** is not included in the snippet I have. So I can’t confirm things like:\n\n- the exact text of the message\n- whether it includes specific locations, dates, or booking links\n- whether both VIP lists are sent separately or combined\n- how often the notifications are sent\n\n## Safest internal summary\n\nIf you need to answer this internally, the most accurate summary is:\n\n**The VIP list notification is used to inform guests about newly available cabins and last-minute availability, especially to help them redeem a voucher. The exact notification text and format are not included in the available material.**\n\nIf you want, I can also help you turn this into a **guest-facing reply** or an **internal Trengo note**."}, {"id": 12, "query": "How many people are usually sent a notification?", "notebooklm": "Typically, about **1,000 to 2,000 people** are sent a notification at a time. \n\nInstead of emailing the entire waiting list at once, Cabiner selects a smaller group for two main reasons:\n*   **To prevent disappointment**, especially when there is only one night or a very limited number of spots available.\n*   **To avoid spamming** subscribers with too many emails.", "dify": "## Usually about **1,000 to 2,000 recipients at a time**\n\nFor waitlist emails, the usual practice is to select **around 1,000–2,000 recipients per send**.\n\n## Why this range is used\n\nTwo reasons are given:\n\n- **To prevent disappointment** when there is only **one night** available\n- **To avoid spamming** people on the waitlist too much\n\n## Extra operational detail\n\nThere is also an example of filtering the audience to contacts who **have not received an email in the last 2 months** before applying the selection.\n\n## Short answer\n\n**Usually around 1,000 to 2,000 people per notification/send.**"}, {"id": 13, "query": "Gedetailleerde uitleg van het annuleringsbeleid en de gebruiksvoorwaarden van de cadeaubon.", "notebooklm": "**Annuleringsbeleid**\nDe restitutie die je ontvangt bij een annulering hangt af van het moment van annuleren en of je gebruikmaakt van het annuleringsfonds:\n\n*   **Meer dan 60 dagen voor aankomst:** Je ontvangt het volledige bedrag terug, minus een eenmalige **administratiekosten van €30**.\n*   **Tussen 60 en 30 dagen voor aankomst:** Je ontvangt een gedeeltelijke restitutie. Cabiner houdt **30% van de huurprijs plus €30 administratiekosten** in.\n*   **Binnen 30 dagen voor aankomst:** Je bent **100% van de overeengekomen prijs** verschuldigd, wat betekent dat je geen geld terugkrijgt.\n\n**Met het annuleringsfonds:**\nAls je bij je boeking hebt gekozen voor deelname aan het annuleringsfonds, kun je in veel gevallen je geld terugkrijgen. Dit geldt alleen wanneer de annulering plaatsvindt door een vastgestelde onzekere gebeurtenis (zoals ziekte) en je hiervoor een geldig bewijsstuk kunt aanleveren.\n\n**Alternatieven als je geen recht hebt op restitutie:**\n*   **Boeking overdragen:** Je mag de boeking altijd **kosteloos overdragen aan familie of vrienden**, zolang je hun namen en contactgegevens aan Cabiner doorgeeft. Let op: het doorverkopen van je boeking via platforms zoals Marktplaats of social media is **strikt verboden** en leidt tot directe annulering zonder teruggave van geld.\n*   **Voucher optie:** In speciale gevallen kan Cabiner proberen jouw geannuleerde nacht opnieuw te verhuren. Als de cabin **succesvol opnieuw wordt geboekt door iemand anders**, ontvang je een compensatievoucher ter waarde van de originele boeking, minus €30 administratiekosten.\n\n***\n\n**Gebruiksvoorwaarden van de cadeaubon en vouchers**\nVoor aangeschafte cadeaubonnen en door Cabiner uitgegeven compensatievouchers gelden de volgende regels:\n\n*   **Geldigheid:** Een aangeschafte cadeaubon is **2 jaar geldig** vanaf de aankoopdatum. Compensatievouchers hebben een geldigheid van **6 maanden tot 1 jaar**. De bon moet binnen deze periode worden ingewisseld, maar het daadwerkelijke verblijf mag ook na de verloopdatum plaatsvinden (je kunt tot 1 jaar vooruit boeken).\n*   **Inwisselen en beperkingen:** Bonnen kunnen alleen worden ingewisseld voor diensten of verblijven via de boekingspagina. Ze zijn nadrukkelijk **niet geldig in de webshop** en kunnen **nooit worden ingewisseld voor contant geld**. Daarnaast is het doorverkopen of verhandelen van de cadeaubon niet toegestaan.\n*   **Waarde en prijsstijgingen:**\n    *   Als je boeking goedkoper is dan de waarde van de bon, blijft het **resterende saldo bewaard** voor toekomstige boekingen (dit kan niet worden uitgekeerd in geld).\n    *   Als de aankoopwaarde hoger is, dien je het **verschil bij te betalen** via een andere betaalmethode. \n    *   Cabiner hanteert altijd de actuele tarieven op het moment van boeken. Omdat de prijzen gedurende het jaar kunnen stijgen, kan het voorkomen dat je een bedrag moet bijbetalen, **zelfs als er op jouw cadeaubon staat \"een overnachting incl. maaltijden\"**.\n*   **Verlies of diefstal:** Cabiner is niet verantwoordelijk voor verlies, diefstal, beschadiging of ongeoorloofd gebruik van de bon. Je dient deze zelf veilig te bewaren.", "dify": "## Annuleringsbeleid en gebruiksvoorwaarden van de cadeaubon\n\nHieronder staat een zo volledig mogelijke uitleg van wat nu duidelijk uit de beschikbare interne stukken volgt. Ik splits het op in:\n\n1. **Annuleringsbeleid**\n2. **Vouchers bij annuleringen**\n3. **Gebruiksvoorwaarden van de cadeaubon**\n4. **Belangrijke verschillen tussen cadeaubon en voucher**\n5. **Wat nog niet volledig hard bevestigd kan worden uit de beschikbare snippets**\n\n---\n\n## 1. Annuleringsbeleid\n\n### Eerste stap bij een annuleringsverzoek\nBij een annuleringsverzoek moet je in **Mews** controleren:\n\n- of de gast een **annuleringsfonds / annuleringsverzekering** heeft\n- wat de **datum van annulering** is  \n  - dit zie je in de **action log** en in de **e-mail**\n\n### Als de gast een annuleringsverzekering heeft\nDan communiceer je naar de gast dat zij **met een geldige reden kosteloos kunnen annuleren**.\n\nDe beschikbare tekst noemt niet volledig welke lijst van geldige redenen formeel geldt binnen de verzekering, maar er wordt wel genoemd dat bij overmacht gedacht wordt aan bijvoorbeeld:\n\n- **overlijden**\n- **ernstig ongeval in naaste kringen**\n- andere gevallen die **per keer bekeken worden**\n\n### Bij annulering meer dan 60 dagen voor verblijf\nAls de overnachting **over 60 dagen of meer** is:\n\n- **€30 administratiekosten** toevoegen  \n  - in Mews via: **Billing > Add product > cancellation fee > 30 euro**\n- het bedrag terugstorten via:\n  - **Mollie** als de betaling via Mollie is gedaan\n  - en/of het **cadeaubon dashboard** als er met een cadeaubon is betaald\n- daarna terug naar **Billing in Mews**\n  - naast **Process payment** het teruggestorte bedrag met een **minteken** invoeren  \n  - voorbeeld: **-400€**\n- daarna hoort de billing weer **gebalanceerd** te zijn\n\n### Bij annulering tussen 60 en 30 dagen voor verblijf\nAls de overnachting **tussen 60 en 30 dagen** valt:\n\n- **€30 administratiekosten**\n- daarnaast wordt **30% van de totale prijs** gerekend\n\nDe snippet stopt hier, dus verdere exacte operationele afhandeling voor deze categorie is niet volledig zichtbaar.\n\n### Geen annuleringsverzekering, wel geldige reden\nAls de gast **geen annuleringsverzekering** heeft maar wel een **echt geldige reden**, dan kun je aangeven dat we een **voucher** kunnen aanbieden.\n\nAls de gast sterk aandringt op geld terug, dan kun je dat **intern navragen**, maar de lijn is:\n\n- **in principe geen geld terug**\n- **wel voucher aanbieden**\n\n### Geen annuleringsverzekering en ook geen geldige reden\nZelfs dan kan een **voucher** worden aangeboden.\n\nDe werkwijze daarbij is:\n\n- eerst doorverwijzen naar **cabiner.co/wijzigboeking**\n- als de gast bezwaar maakt tegen de hoge wijzigingskosten, kunnen ze later mailen\n- dan kan een **voucher van €30** worden aangeboden\n\n### Wel annuleringsverzekering, maar geen geldige reden\nDan geldt:\n\n- **geen geld terug**\n- **wel een voucher**\n\nHier is vaak extra uitleg richting de gast nodig.\n\n---\n\n## 2. Vouchers bij annuleringen\n\nOmdat vouchers nauw samenhangen met annuleringen, is dit belangrijk om goed uit elkaar te houden.\n\n### Wat is een voucher?\nEen voucher is een document dat door Cabiner wordt uitgegeven als compensatie voor:\n\n- een eerdere dienst of product dat niet aan de verwachtingen voldeed\n- een ander vergelijkbaar ongemak of probleem\n- in bepaalde gevallen ook bij **annuleringen**\n\nDe voucher vertegenwoordigt een **geldwaarde** en kan worden gebruikt voor toekomstige boekingen of transacties bij Cabiner.\n\n### Geldigheid van vouchers\nEr staan twee formuleringen in de stukken:\n\n- vouchers zijn **tussen 6 maanden en 1 jaar geldig**\n- vouchers die worden uitgegeven **ter compensatie van verblijf** zijn **1 jaar inwisselbaar**\n- in het helpdesk-handboek staat ook dat deze vouchers **1 jaar geldig** zijn\n\nVoor annuleringen lijkt de praktische lijn dus te zijn:\n\n- **1 jaar geldig vanaf verstrekking**\n- de gast moet **binnen dat jaar boeken**\n- het daadwerkelijke verblijf hoeft **niet binnen dat jaar plaats te vinden**\n\nVoorbeeld uit de interne uitleg:\n\n- boeking voor **20 maart 2021**\n- geannuleerd op **14 januari 2021**\n- voucher geldig tot **14 januari 2022**\n- verblijf mag ook **na 14 januari 2022** plaatsvinden, zolang de boeking maar op tijd is gemaakt\n\n### Opnieuw annuleren na gebruik van een eerdere voucher\nAls een gast:\n\n1. eerder een boeking heeft geannuleerd\n2. daarvoor een voucher heeft gekregen\n3. vervolgens een nieuwe boeking heeft gemaakt\n4. en die nieuwe boeking opnieuw moet annuleren of verzetten\n\ndan geldt:\n\n- opnieuw **€30 administratiekosten**\n- er wordt een **nieuwe voucher** verstrekt\n- die nieuwe voucher is vanaf dat moment weer **1 jaar geldig**\n\n### Na vervaldatum\nNa het verstrijken van de geldigheidsperiode:\n\n- vervalt de voucher\n- kan deze **niet meer worden gebruikt**\n\n### Gebruik van vouchers\nVouchers:\n\n- kunnen worden ingewisseld voor **diensten of verblijven bij Cabiner**\n- kunnen **niet** worden ingewisseld voor **contant geld**\n- kunnen **niet** worden gebruikt voor andere financiële transacties\n\n---\n\n## 3. Gebruiksvoorwaarden van de cadeaubon\n\n### Wat is een cadeaubon?\nEen cadeaubon is een schriftelijk of digitaal document dat de houder recht geeft op een **specifieke geldwaarde** voor aankoop van producten, diensten of goederen bij Cabiner.\n\nDie waarde kan:\n\n- vooraf zijn betaald\n- of geschonken zijn aan de ontvanger\n\nDe ontvanger kan de cadeaubon binnen de geldende voorwaarden en geldigheidsperiode gebruiken voor producten of diensten naar keuze bij Cabiner.\n\n### Geldigheid van de cadeaubon\nDe cadeaubon is:\n\n- **2 jaar geldig vanaf de datum van aankoop**\n- tenzij er **anders op de bon zelf vermeld** staat\n\nBelangrijk detail:\n\n- de bon moet **binnen die 2 jaar worden ingewisseld / gebruikt voor het maken van een boeking**\n- het daadwerkelijke verblijf hoeft **niet binnen die 2 jaar plaats te vinden**\n\nVoorbeeld uit de interne uitleg:\n- een cadeaubon die vandaag wordt aangeschaft, kan tot **2 jaar later** worden gebruikt om te boeken\n- het verblijf mag ook **na die twee jaar** liggen, zolang het boeken op tijd is gebeurd\n\n### Waarvoor kan de cadeaubon gebruikt worden?\nCadeaubonnen kunnen worden ingewisseld voor:\n\n- **diensten**\n- **verblijven bij Cabiner**\n\nDe formulering noemt ook producten/goederen in de definitie, maar in de gebruiksbepaling staat vooral dat ze kunnen worden ingewisseld voor diensten of verblijven zoals op het document aangegeven.\n\n### Niet toegestaan\nMet een cadeaubon mag je niet:\n\n- deze inwisselen voor **contant geld**\n- gebruiken voor andere **financiële transacties**\n- de cadeaubon **doorverkopen**\n- de cadeaubon **verhandelen**\n\n### Na vervaldatum\nNa afloop van de geldigheidsperiode:\n\n- vervalt de cadeaubon\n- kan deze **niet meer worden gebruikt**\n\n---\n\n## 4. Belangrijke verschillen tussen cadeaubon en voucher\n\n### Cadeaubon\n- is een **gekochte of geschonken waarde**\n- geeft recht op een geldbedrag voor bestedingen bij Cabiner\n- is **2 jaar geldig**\n- hoeft niet te leiden tot een verblijf binnen die 2 jaar, zolang de boeking maar binnen de termijn wordt gemaakt\n- mag niet worden ingewisseld voor geld\n- mag niet worden doorverkocht of verhandeld\n\n### Voucher\n- wordt door **Cabiner uitgegeven**\n- is meestal compensatie bij:\n  - problemen met verblijf/dienst\n  - ongemak\n  - bepaalde annuleringen\n- is meestal **6 maanden tot 1 jaar geldig**, en bij verblijf/annulering praktisch **1 jaar**\n- moet binnen die termijn gebruikt worden voor het maken van een boeking\n- verblijf mag daarna plaatsvinden\n- kan niet ingewisseld worden voor geld\n\n---\n\n## 5. Praktische samenvatting voor intern gebruik\n\n### Als iemand vraagt: “Wat zijn de annuleringsregels?”\nDan kun je in elk geval uitleggen:\n\n- check eerst of de gast een **annuleringsverzekering** heeft\n- met verzekering + geldige reden: **kosteloos annuleren**\n- bij annulering **60+ dagen vooraf**:\n  - **€30 administratiekosten**\n  - restbedrag terugstorten volgens betaalmethode\n  - verwerking in Mews correct tegenboeken\n- bij **60-30 dagen vooraf**:\n  - **€30 administratiekosten**\n  - plus **30% van de totale prijs**\n- zonder recht op terugbetaling wordt vaak een **voucher** aangeboden\n- ook bij ontbreken van verzekering of geldige reden kan in sommige gevallen een voucher worden aangeboden\n\n### Als iemand vraagt: “Hoe werkt een cadeaubon?”\nDan kun je uitleggen:\n\n- cadeaubon = **vooraf betaalde of geschonken waarde**\n- geldig **2 jaar vanaf aankoop**\n- moet binnen 2 jaar worden gebruikt om te boeken\n- verblijf zelf mag later plaatsvinden\n- niet inwisselbaar voor geld\n- niet doorverkopen of verhandelen\n- na vervaldatum vervalt het tegoed\n\n---\n\n## 6. Wat niet volledig sluitend in deze snippets staat\n\nEr zijn een paar punten waar de beschikbare tekst **niet volledig genoeg** is om absoluut definitief alles over te zeggen:\n\n- de **volledige annuleringsstaffel** buiten de zichtbare categorieën  \n  - we zien duidelijk:\n    - **60+ dagen**\n    - **60–30 dagen**\n  - maar niet wat er exact geldt voor **minder dan 30 dagen**, omdat de snippet afbreekt\n- de **volledige polisvoorwaarden** van de annuleringsverzekering\n- of er nog aanvullende uitzonderingen of operationele uitzonderingsroutes zijn\n\nAls je wilt, kan ik dit ook meteen omzetten naar één van deze formats:\n\n1. **korte interne samenvatting voor agents**\n2. **klantvriendelijke uitleg in het Nederlands**\n3. **beslisboom: wat doe je per annuleringssituatie**\n4. **Trengo-antwoordtemplate voor gasten over annuleren en cadeaubonnen**"}, {"id": 14, "query": "Hoe gebruik ik een voucher?", "notebooklm": "Je kunt je cadeaubon of compensatievoucher gebruiken door vooraf zelf een reservering voor een verblijf of dienst te maken via de boekingspagina van Cabiner. Volg hierbij de specifieke instructies die op het voucherdocument staan vermeld. Houd er rekening mee dat reserveringen met een voucher altijd afhankelijk zijn van de beschikbaarheid van de cabins.\n\n**Hoe de waarde van de voucher wordt verrekend:**\n*   **Als je boeking goedkoper is:** Het resterende saldo blijft op de voucher bewaard voor toekomstige boekingen. Dit restsaldo kan niet in contant geld worden uitgekeerd.\n*   **Als je boeking duurder is:** Je dient het resterende verschil bij te betalen via een van de andere beschikbare betaalmethoden.\n*   **Let op eventuele prijsstijgingen:** Cabiner hanteert altijd de actuele tarieven op het moment van boeken. Omdat prijzen gedurende het jaar kunnen stijgen, kan het voorkomen dat je een bedrag moet bijbetalen, zelfs als er op jouw bon expliciet staat \"een overnachting incl. maaltijden\".\n\n**Belangrijke regels bij het inwisselen:**\n*   Vouchers kunnen uitsluitend worden ingewisseld voor verblijven of diensten via de boekingspagina en zijn **niet geldig in de webshop**.\n*   Ze kunnen **nooit worden ingewisseld voor contant geld**.\n*   Het is strikt verboden om je cadeaubon of voucher door te verkopen of te verhandelen.", "dify": "## Hoe gebruik je een voucher?\n\nEen voucher gebruik je voor een **toekomstige boeking of transactie bij Cabiner**.\n\n### Belangrijkste regels\n- Een voucher wordt **door Cabiner uitgegeven**.\n- Een voucher vertegenwoordigt een **geldwaarde**.\n- Je kunt deze gebruiken voor **diensten of verblijven bij Cabiner**.\n- Een voucher kan **niet worden ingewisseld voor contant geld**.\n- Een voucher mag niet worden gebruikt voor andere **financiële transacties**.\n- Na afloop van de geldigheidsduur **vervalt** de voucher en kan deze niet meer worden gebruikt.\n\n### Geldigheid\n- Vouchers zijn **tussen 6 maanden en 1 jaar geldig**.\n- Vouchers die als **compensatie voor een verblijf** worden uitgegeven, zijn **1 jaar inwisselbaar**.\n- In de praktische werkwijze voor zelf aangemaakte compensatievouchers wordt doorgaans **1 jaar geldigheid** aangehouden.\n\n### Hoe de gast de voucher gebruikt\n- De gast maakt zelf een nieuwe boeking via de **boekingspagina**.\n- De voucher wordt daarbij gebruikt voor die nieuwe boeking.\n- De voucher moet **binnen de geldigheidsperiode** worden ingezet.\n\n### Belangrijk detail\nDe voucher moet **binnen de geldigheidsperiode gebruikt worden om te boeken**.  \nHet daadwerkelijke verblijf hoeft niet per se binnen die periode plaats te vinden, zolang de boeking maar op tijd is gemaakt.\n\n### Als je zelf een voucher moet aanmaken\nIn het voucherdashboard:\n- vul bij **‘Van’**: `Cabiner`\n- vul het **bedrag** in\n- stel de **geldigheid** in  \n  - normaal gesproken **1 jaar** bij compensatie en voucherregeling\n- vul **naam en e-mail van de ontvanger** in\n- klik op **‘Toevoegen’**\n- daarna is de voucher aangemaakt, maar nog **niet verzonden**\n- om te verzenden ga je naar de voucher in de lijst en klik je op het **envelop-icoon**\n\n### Handmatige verwerking\nAls je een voucher handmatig inwisselt of de waarde aanpast:\n- gebruik je het **pennetje**\n- noteer altijd: **‘ingewisseld voor boeking [boekingsnummer]’**\n\n## Kort antwoord voor een gast\nJe gebruikt een voucher door binnen de geldigheidsduur een nieuwe boeking te maken bij Cabiner via de boekingspagina. De voucher is alleen geldig voor Cabiner-diensten of verblijven, niet voor contant geld, en vervalt na de einddatum.\n\nAls je wilt, kan ik hier ook meteen een **klantvriendelijke antwoordtemplate** van maken voor mail of Trengo."}, {"id": 15, "query": "Waar kan ik mijn auto parkeren?", "notebooklm": "Parkeren direct naast de cabins is niet mogelijk. Na je boeking ontvang je gedetailleerde informatie over de specifieke parkeerlocaties en de bijbehorende wandelroutes naar jouw cabin. \n\nAfhankelijk van het natuurgebied dat je bezoekt, zijn dit de aangewezen parkeerplaatsen:\n\n*   **Ruiten Aa:** Je kunt parkeren bij **P1** achter de grote schoorsteen bij natuurslagerij 'Woeste Grond' (Ter Apelerstraat 16, Sellingen). Voor een kortere route kun je parkeren bij **P2** in het centrum van Sellingen (Dorpstraat 1).\n*   **Drentsche Aa:** Parkeer bij **P1** bij het kantoor van Staatsbosbeheer (Ieberen 1, Elp), waarbij je de eerste parkeerplaats aan je rechterhand gebruikt. Verblijf je in cabin C4, C5, C6 of C8? Dan kun je ook parkeren bij **P2** bij buitencentrum Boomkroonpad (Steenhopenweg 4, Drouwen). Het is streng verboden om met de auto het natuurgebied in te rijden richting de cabins.\n*   **Horsterwold (Stille Kern):** Voor de langere wandelroutes parkeer je bij **P1** (tegenover Groenewoudseweg 70 in Zeewolde). Voor kortere routes kun je terecht bij **P2** (Parkeerplaats Horsterwold, Groenewoudseweg 7 in Zeewolde).\n*   **Sallandse Heuvelrug:** De wandelroutes starten vanaf **P1** bij het buitencentrum van Staatsbosbeheer (Grotestraat 281, Nijverdal). Er is ook een **P2** voor een andere route, maar let op: je mag je auto 's nachts niet meer laten staan bij P3.\n*   **Dwingelderveld & Ruinen:** Parkeer bij **P1** bij het voormalig Planetron (Drift 11 C, Dwingeloo). Voor een kortere wandeling naar cabin C1 kun je parkeren bij **P2** (Parkeerplaats bij Plaggenhut Echten, Zuidwolderweg 2, Echten). Gebruik hier uitsluitend de 5 parkeervakken langs de doorgaande weg en parkeer niet op de Brink of bij P3.\n*   **Het Hogeland (Basecamp):** Je parkeert op het parkeerterrein van de monumentale boerderij Enne Jans Heerd (Maarhuizen 3, Winsum). Op dit terrein is ook een laadpaal voor elektrische auto's aanwezig.\n*   **Lauwersmeer (Basecamp):** Gasten hebben tijdelijke toestemming om dichtbij het basecamp te parkeren op **Rijsdammen 1** in Kollumerpomp. Let op: leg in dit geval altijd een briefje met 'Cabiner' achter je voorruit. Voor langere wandel- of fietsroutes kun je ook starten vanaf **P1**, **P2** of **P3**.", "dify": "## Waar kan je je auto parkeren?\n\n- **Na de boeking** ontvangt de gast informatie over de **juiste
